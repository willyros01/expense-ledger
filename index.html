<script>
  window.__cloudEnabled = false;
  window.__db = null;
  window.addEventListener("error", function(e){
    var root = document.getElementById("root");
    if (root && !window.__appRendered) {
      root.innerHTML = '<div style="font-family:sans-serif;padding:24px;max-width:600px;margin:0 auto;">' +
        '<h2 style="color:#b91c1c;">The app couldn\'t start</h2>' +

        '<pre style="background:#f3f4f6;padding:12px;border-radius:8px;white-space:pre-wrap;font-size:12px;">' +
        (e.message || "Unknown error") + (e.filename ? ("\nin " + e.filename + ":" + e.lineno) : "") +
        '</pre></div>';
    }
  });
  try {
    if (typeof firebaseConfig !== "undefined" && firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY") {
      firebase.initializeApp(firebaseConfig);
      window.__db = firebase.firestore();
      window.__cloudEnabled = true;
    }
  } catch (e) {
    console.error("Firebase init failed, falling back to local storage:", e);
    window.__cloudEnabled = false;
  }
</script>

function colorFor(name){ let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h); return PALETTE[Math.abs(h)%PALETTE.length]; }

function chipColorFor(code){ let h=0; for(let i=0;i<code.length;i++) h=code.charCodeAt(i)+((h<<5)-h); return CHIP_COLORS[Math.abs(h)%CHIP_COLORS.length]; }

function load(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch (e) { return fallback; } }

}

function compressImage(file, maxWidth=600, quality=0.5){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxWidth/img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width*scale);
        canvas.height = Math.round(img.height*scale);
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL("image/jpeg",quality));
      };
      img.onerror = ()=>reject(new Error("Could not read image"));
      img.src = e.target.result;
    };
    reader.onerror = ()=>reject(new Error("Could not read file"));
    reader.readAsDataURL(file);
  });
}
async function compressImageSafe(file){
  const attempts = [[600,0.5],[450,0.35],[320,0.25]];
  for(const [w,q] of attempts){
    const dataUrl = await compressImage(file,w,q);
    if(dataUrl.length < 650000) return dataUrl;
  }
  return null;
}

async function fetchRateForCurrencyDate(currency, dateStr){
  if(currency === "CAD") return 1;
  const today = new Date().toISOString().slice(0,10);
  try {
    const url = dateStr === today ? `https://api.frankfurter.app/latest?from=${currency}&to=CAD` : `https://api.frankfurter.app/${dateStr}?from=${currency}&to=CAD`;
    const res = await fetch(url);
    const data = await res.json();
    const r = data.rates && data.rates.CAD;
    if(!r) throw new Error("no rate");
    return r;
  } catch(e){
    try {
      const res2 = await fetch(`https://api.exchangerate-api.com/v4/latest/${currency}`);
      const data2 = await res2.json();
      return (data2.rates && data2.rates.CAD) || null;
    } catch(e2){ return null; }
  }
}

// Tries the exact date first; then a +/-10 day window; then the last known rate
// for that currency (shared across devices when cloud sync is on); only as a true
// last resort, a 1:1 placeholder. Rate is never null, so saving is never blocked.
async function fetchRateWithFallback(currency, dateStr, cache){
  if(currency === "CAD") return { rate:1, usedDate:dateStr, source:"exact" };
  const exact = await fetchRateForCurrencyDate(currency, dateStr);
  if(exact != null) return { rate:exact, usedDate:dateStr, source:"exact" };
  try {
    const target = new Date(dateStr+"T00:00:00");
    const start = new Date(target); start.setDate(start.getDate()-10);
    const end = new Date(target); end.setDate(end.getDate()+10);
    const today = new Date();
    const clampedEnd = end > today ? today : end;
    const fmt = x=>x.toISOString().slice(0,10);
    const url = `https://api.frankfurter.app/${fmt(start)}..${fmt(clampedEnd)}?from=${currency}&to=CAD`;
    const res = await fetch(url);
    const data = await res.json();
    const rates = data.rates;
    if(rates){
      let best=null, bestDiff=Infinity;
      for(const dt of Object.keys(rates)){
        const diff = Math.abs(new Date(dt) - target);
        if(diff < bestDiff){ bestDiff=diff; best=dt; }
      }
      if(best) return { rate: rates[best].CAD, usedDate: best, source:"nearby" };
    }
  } catch(e){}
  if(cache && cache[currency]) return { rate: cache[currency].rate, usedDate: cache[currency].date, source:"cached" };
  return { rate:1, usedDate:null, source:"unknown" };
}

    Pending: {cls:"bg-amber-100 text-amber-800 border-amber-300", icon:"🕒"},

    Rejected: {cls:"bg-red-100 text-red-800 border-red-300", icon:"❌"},
  };
  const m = map[status] || map.Pending;
  return <span className={`inline-flex items-center gap-1 rounded-full border px-2 py-0.5 text-[11px] font-medium ${m.cls}`}>{m.icon} {status}</span>;
}

function ExpenseTracker(){
  const [entries, setEntries] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [vendors, setVendors] = useState([]);
  const [rateCache, setRateCache] = useState({});
  const [syncError, setSyncError] = useState(false);
  const [isOffline, setIsOffline] = useState(() => cloudConfigured ? load(LS.offlineMode, false) : true);
  const useCloud = cloudConfigured && !isOffline;
  const [merging, setMerging] = useState(false);

  const [previewRate, setPreviewRate] = useState(null);
  const [previewRateInfo, setPreviewRateInfo] = useState(null);
  const [previewLoading, setPreviewLoading] = useState(false);
  const debounceRef = useRef(null);

  const [userName, setUserName] = useState("");
  const [defaultSubmittedBy, setDefaultSubmittedBy] = useState("");
  const [submittedByTouched, setSubmittedByTouched] = useState(false);
  const [form, setForm] = useState(emptyForm());
  const [editingId, setEditingId] = useState(null);
  const [formError, setFormError] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [imgError, setImgError] = useState("");

  const [showNewVendor, setShowNewVendor] = useState(false);
  const [newVendorText, setNewVendorText] = useState("");
  const [showCatManager, setShowCatManager] = useState(false);
  const [showVendorManager, setShowVendorManager] = useState(false);
  const [catEdits, setCatEdits] = useState({});
  const [vendorEdits, setVendorEdits] = useState({});
  const [newCatText, setNewCatText] = useState("");

  const [search, setSearch] = useState("");
  const [categoryFilter, setCategoryFilter] = useState("All");
  const [statusFilter, setStatusFilter] = useState("All");
  const [sortKey, setSortKey] = useState("date");
  const [sortDir, setSortDir] = useState("desc");
  const [lightbox, setLightbox] = useState(null);
  const [expandedMonths, setExpandedMonths] = useState({});

  const [selected, setSelected] = useState({});
  const [pendingDelete, setPendingDelete] = useState(null);
  const pendingTimerRef = useRef(null);
  const [undoTick, setUndoTick] = useState(0);
  const entriesRef = useRef(entries);
  useEffect(()=>{ entriesRef.current = entries; },[entries]);

  const [importing, setImporting] = useState(false);
  const [importSummary, setImportSummary] = useState(null);
  const fileInputRef = useRef(null);
  const [showExportMenu, setShowExportMenu] = useState(false);

  const [toast, setToast] = useState("");
  const showToast = useCallback((msg)=>{ setToast(msg); setTimeout(()=>setToast(""),2600); },[]);

  // Merges anything saved locally while offline into Firestore, skipping exact
  // duplicates (same date+vendor+currency+amount as something already in the
  // cloud), then clears the local copy of whatever was successfully merged.
  const mergeOfflineToCloud = useCallback(async () => {
    if (!cloudConfigured) return;
    const localEntries = load(LS.expenses, []).map(normalizeEntry);
    const localCats = load(LS.categories, null);
    const localVens = load(LS.vendors, null);
    if (localEntries.length === 0 && !localCats && !localVens) return;
    setMerging(true);
    try {
      if (localEntries.length > 0) {
        const snap = await db.collection("expenses").get();
        const existingKeys = new Set(snap.docs.map((d) => dedupKey(normalizeEntry(d.data()))));
        const toMerge = localEntries.filter((en) => !existingKeys.has(dedupKey(en)));
        if (toMerge.length > 0) {
          const batch = db.batch();
          toMerge.forEach((en) => batch.set(db.collection("expenses").doc(en.id), en));
          await batch.commit();
        }
        const skipped = localEntries.length - toMerge.length;
        localStorage.removeItem(LS.expenses);
        showToast(`Synced ${toMerge.length} offline ${toMerge.length === 1 ? "entry" : "entries"} to the cloud${skipped > 0 ? ` · skipped ${skipped} duplicate${skipped === 1 ? "" : "s"}` : ""}`);
      }
      if (localCats && localCats.length) {
        const doc = await db.collection("meta").doc("categories").get();
        const cloudCats = doc.exists ? doc.data().list : DEFAULT_CATEGORIES;
        const merged = Array.from(new Set([...cloudCats, ...localCats]));
        await db.collection("meta").doc("categories").set({ list: merged });
        localStorage.removeItem(LS.categories);
      }
      if (localVens && localVens.length) {
        const doc = await db.collection("meta").doc("vendors").get();
        const cloudVens = doc.exists ? doc.data().list : [];
        const merged = Array.from(new Set([...cloudVens, ...localVens]));
        await db.collection("meta").doc("vendors").set({ list: merged });
        localStorage.removeItem(LS.vendors);
      }
    } catch (e) {
      console.error("Merge failed:", e);
      showToast("Couldn't sync your offline entries to the cloud yet — they're safe locally, will retry next time you're online");
    } finally {
      setMerging(false);
    }
  }, []);

  function toggleOffline() {
    const next = !isOffline;
    setIsOffline(next);
    save(LS.offlineMode, next);
  }

  useEffect(()=>{
    if(useCloud){
      mergeOfflineToCloud();
      const unsubE = db.collection("expenses").onSnapshot(
        snap=>{ setEntries(snap.docs.map(d=>normalizeEntry(d.data()))); setLoaded(true); },
        err=>{ console.error(err); setSyncError(true); setLoaded(true); }
      );
      const unsubC = db.collection("meta").doc("categories").onSnapshot(doc=>{
        if(doc.exists) setCategories(doc.data().list);
        else db.collection("meta").doc("categories").set({list:DEFAULT_CATEGORIES});
      });
      const unsubV = db.collection("meta").doc("vendors").onSnapshot(doc=>{
        if(doc.exists) setVendors(doc.data().list);
        else db.collection("meta").doc("vendors").set({list:[]});
      });
      const unsubR = db.collection("meta").doc("rateCache").onSnapshot(doc=>{
        if(doc.exists) setRateCache(doc.data().map || {});
      });
      return ()=>{ unsubE(); unsubC(); unsubV(); unsubR(); };
    } else {
      setEntries(load(LS.expenses,[]).map(normalizeEntry));
      setCategories(load(LS.categories,DEFAULT_CATEGORIES));
      setVendors(load(LS.vendors,[]));
      setRateCache(load(LS.rateCache,{}));
      setLoaded(true);
    }
  },[useCloud]);

  // personal preferences: always local to this device, never synced to the cloud
  useEffect(()=>{
    const savedName = load(LS.userName, "");
    const savedSubmittedBy = load(LS.submittedBy, "");
    if(savedName) setUserName(savedName);
    const initial = savedSubmittedBy || savedName;
    if(initial){
      setForm(f=>({...f, submittedBy:initial}));
      setDefaultSubmittedBy(initial);
    }
  },[]);

  useEffect(()=>{
    if(!form.date || !form.currency) return;
    setPreviewLoading(true);
    if(debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(async ()=>{
      const {rate, usedDate, source} = await fetchRateWithFallback(form.currency, form.date, rateCache);
      setPreviewRate(rate);
      setPreviewRateInfo(source !== "exact" ? {usedDate, source} : null);
      setPreviewLoading(false);
    },350);
    return ()=>clearTimeout(debounceRef.current);
  },[form.date, form.currency, rateCache]);

  useEffect(()=>{
    if(!pendingDelete) return;
    const id = setInterval(()=>setUndoTick(t=>t+1), 100);
    return ()=>clearInterval(id);
  },[pendingDelete]);

  const batchWriteEntries = useCallback(async (list)=>{
    if(list.length===0) return;
    if(useCloud){
      try {
        const batch = db.batch();
        list.forEach(en=> batch.set(db.collection("expenses").doc(en.id), en));
        await batch.commit();
      } catch(e){ showToast("Couldn't save to the cloud — try again"); }
    } else {
      setEntries(prev=>{
        const map = new Map(prev.map(e=>[e.id,e]));
        list.forEach(en=>map.set(en.id,en));
        const next = Array.from(map.values());
        save(LS.expenses,next);
        return next;
      });
    }
  },[useCloud]);
  const writeEntry = useCallback((entry)=> batchWriteEntries([entry]), [batchWriteEntries]);
  const writeCategories = useCallback(async (next)=>{
    setCategories(next);
    if(useCloud){ try { await db.collection("meta").doc("categories").set({list:next}); } catch(e){} }
    else save(LS.categories,next);
  },[useCloud]);
  const writeVendors = useCallback(async (next)=>{
    setVendors(next);
    if(useCloud){ try { await db.collection("meta").doc("vendors").set({list:next}); } catch(e){} }
    else save(LS.vendors,next);
  },[useCloud]);
  const updateRateCache = useCallback((currency, rate, date)=>{
    setRateCache(prev=>{
      const next = { ...prev, [currency]: { rate, date } };
      if(useCloud){ db.collection("meta").doc("rateCache").set({map: next}).catch(()=>{}); }
      else save(LS.rateCache, next);
      return next;
    });
  },[useCloud]);
  function handleUserNameChange(v){
    setUserName(v);
    save(LS.userName, v);
    if(!submittedByTouched){
      setForm(f=>({...f, submittedBy:v}));
      setDefaultSubmittedBy(v);
    }
  }
  function handleSubmittedByChange(v){
    setSubmittedByTouched(true);
    setForm(f=>({...f, submittedBy:v}));
  }

  function addCategory(){
    const name = newCatText.trim();
    if(!name || categories.includes(name)) return;
    writeCategories([...categories,name]); setNewCatText("");
  }
  async function renameCategory(oldName,newName){
    const trimmed = newName.trim();
    if(!trimmed || trimmed===oldName) return;
    await writeCategories(categories.map(c=>c===oldName?trimmed:c));
    const affected = entries.filter(en=>en.category===oldName).map(en=>({...en,category:trimmed}));
    if(affected.length) await batchWriteEntries(affected);
    showToast(`Renamed category to "${trimmed}"`);
  }
  async function deleteCategory(name){
    if(categories.length<=1) return showToast("Keep at least one category");
    const fallback = categories.find(c=>c!==name) || "Other";
    await writeCategories(categories.filter(c=>c!==name));
    const affected = entries.filter(en=>en.category===name).map(en=>({...en,category:fallback}));
    if(affected.length) await batchWriteEntries(affected);
    if(form.category===name) setForm(f=>({...f,category:fallback}));
    showToast(`Deleted "${name}" — entries moved to "${fallback}"`);
  }

  async function addVendorToList(name){
    const trimmed = (name||"").trim();
    if(!trimmed || vendors.includes(trimmed)) return;
    await writeVendors([...vendors,trimmed]);
  }
  async function renameVendor(oldName,newName){
    const trimmed = newName.trim();
    if(!trimmed || trimmed===oldName) return;
    await writeVendors(vendors.map(v=>v===oldName?trimmed:v));
    const affected = entries.filter(en=>en.vendor===oldName).map(en=>({...en,vendor:trimmed}));
    if(affected.length) await batchWriteEntries(affected);
    showToast(`Renamed vendor to "${trimmed}"`);
  }
  async function deleteVendor(name){ await writeVendors(vendors.filter(v=>v!==name)); showToast(`Removed "${name}" from vendor list`); }
  function handleVendorSelect(e){
    const v = e.target.value;
    if(v==="__new__"){ setShowNewVendor(true); setForm(f=>({...f,vendor:""})); }
    else { setShowNewVendor(false); setForm(f=>({...f,vendor:v})); }
  }
  async function confirmNewVendor(){
    const name = newVendorText.trim();
    if(!name) return;
    await addVendorToList(name);
    setForm(f=>({...f,vendor:name}));
    setNewVendorText(""); setShowNewVendor(false);
  }

  function startEdit(entry){
    setEditingId(entry.id);
    setForm({ date:entry.date, amount:String(entry.amount), currency:entry.currency||"PHP", vendor:entry.vendor, category:entry.category, comments:entry.comments||"", submittedBy:entry.submittedBy||"", receipt:entry.receipt||null });
    setShowNewVendor(false); setSubmittedByTouched(true); setFormError("");
    window.scrollTo({top:0,behavior:"smooth"});
  }
  function cancelEdit(){ setEditingId(null); setForm(emptyForm(defaultSubmittedBy,categories[0])); setSubmittedByTouched(false); setFormError(""); }

  async function handleReceiptChange(e){
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    setImgError("");
    try {
      const dataUrl = await compressImageSafe(file);
      if(!dataUrl){ setImgError("That photo is too large even after compression — try a clearer, closer shot."); return; }
      setForm(f=>({...f,receipt:dataUrl}));
    } catch(err){ setImgError("Couldn't process that image — try a different photo."); }
  }

  async function handleSubmit(e){
    e.preventDefault();
    const amt = parseFloat(form.amount);
    if(!form.date) return setFormError("Pick a date.");
    if(!form.vendor.trim()) return setFormError("Enter a vendor.");
    if(!amt || amt<=0) return setFormError("Enter an amount greater than zero.");

    setSubmitting(true); setFormError("");
    const {rate: dateRate, usedDate, source} = await fetchRateWithFallback(form.currency, form.date, rateCache);
    if(source==="exact" || source==="nearby") updateRateCache(form.currency, dateRate, usedDate);
    const amountCAD = amt*dateRate;
    const vendorName = form.vendor.trim();
    if(!vendors.includes(vendorName)) addVendorToList(vendorName);

    const successMsg = (verb)=>{
      if(source==="exact") return `Expense ${verb}`;
      if(source==="nearby") return `${verb==="added"?"Added":"Updated"} — used the closest available rate (${usedDate})`;
      if(source==="cached") return `${verb==="added"?"Added":"Updated"} — exchange service unavailable, used last known rate from ${usedDate}`;
      return `${verb==="added"?"Added":"Updated"} — no rate available yet, saved with a 1:1 placeholder; edit later to fix`;
    };

    if(editingId){
      const updated = entries.find(en=>en.id===editingId);
      const next = { ...updated, date:form.date, amount:amt, currency:form.currency, vendor:vendorName, category:form.category, comments:form.comments.trim(), submittedBy:form.submittedBy.trim(), receipt:form.receipt, amountCAD, rate:dateRate, rateDate:usedDate, rateSource:source };
      await writeEntry(next);
      showToast(successMsg("updated"));
    } else {
      const newEntry = { id:`${Date.now()}-${Math.random().toString(36).slice(2,8)}`, date:form.date, amount:amt, currency:form.currency, vendor:vendorName, category:form.category, comments:form.comments.trim(), submittedBy:form.submittedBy.trim(), receipt:form.receipt, amountCAD, rate:dateRate, rateDate:usedDate, rateSource:source, status:"Pending", approvedBy:null, approvedAt:null, createdAt:Date.now() };
      await writeEntry(newEntry);
      showToast(successMsg("added"));
    }
    const justUsedSubmittedBy = form.submittedBy.trim();
    if(justUsedSubmittedBy){ setDefaultSubmittedBy(justUsedSubmittedBy); save(LS.submittedBy, justUsedSubmittedBy); }
    setForm(emptyForm(justUsedSubmittedBy || defaultSubmittedBy, categories[0]));
    setSubmittedByTouched(false);
    setEditingId(null); setSubmitting(false);
  }

  async function setStatus(id,status){
    const en = entries.find(e=>e.id===id);
    if(!en) return;
    await writeEntry({ ...en, status, approvedBy: status==="Pending"?null:(userName||"Unnamed reviewer"), approvedAt: status==="Pending"?null:Date.now() });
    showToast(`Marked ${status.toLowerCase()}`);
  }
  function toggleSort(key){ if(sortKey===key) setSortDir(d=>d==="asc"?"desc":"asc"); else { setSortKey(key); setSortDir("asc"); } }

  // ---- selection ----
  function toggleSelect(id){ setSelected(s=>{ const n={...s}; if(n[id]) delete n[id]; else n[id]=true; return n; }); }
  function selectAllVisible(ids, checked){ setSelected(s=>{ const n={...s}; ids.forEach(id=>{ if(checked) n[id]=true; else delete n[id]; }); return n; }); }
  function clearSelection(){ setSelected({}); }

  // ---- soft delete with undo ----
  function softDelete(ids){
    const toDelete = entries.filter(en=>ids.includes(en.id));
    if(toDelete.length===0) return;
    if(pendingDelete) commitPendingDelete(pendingDelete);

    setEntries(prev=>prev.filter(en=>!ids.includes(en.id)));
    setSelected(s=>{ const n={...s}; ids.forEach(id=>delete n[id]); return n; });

    const expiresAt = Date.now() + UNDO_WINDOW_MS;
    const record = { ids, entries: toDelete, expiresAt };
    if(pendingTimerRef.current) clearTimeout(pendingTimerRef.current);
    pendingTimerRef.current = setTimeout(()=>commitPendingDelete(record), UNDO_WINDOW_MS);
    setPendingDelete(record);
  }
  async function commitPendingDelete(record){
    if(!record) return;
    setPendingDelete(cur=> (cur && cur.expiresAt===record.expiresAt) ? null : cur);
    if(useCloud){
      try {
        const batch = db.batch();
        record.ids.forEach(id=> batch.delete(db.collection("expenses").doc(id)));
        await batch.commit();
      } catch(e){ showToast("Couldn't delete from the cloud — try again"); }
    } else {
      setEntries(prev=>{
        const next = prev.filter(en=>!record.ids.includes(en.id));
        save(LS.expenses,next);
        return next;
      });
    }
  }
  function undoDelete(){
    if(!pendingDelete) return;
    if(pendingTimerRef.current) clearTimeout(pendingTimerRef.current);
    setEntries(prev=>{
      const map = new Map(prev.map(e=>[e.id,e]));
      pendingDelete.entries.forEach(e=>map.set(e.id,e));
      return Array.from(map.values());
    });
    setPendingDelete(null);
    showToast("Restored");
  }
  function deleteEntry(id){ softDelete([id]); }
  function deleteSelected(){ softDelete(Object.keys(selected)); }

  // ---- CSV / Excel import ----
  function pickField(row, candidates){
    const keys = Object.keys(row);
    for(const c of candidates){
      const found = keys.find(k=>k.trim().toLowerCase()===c);
      if(found && String(row[found]).trim()!=="") return row[found];
    }
    return undefined;
  }
  function parseDateValue(v){
    if(v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
    if(typeof v==="string" && /^\d{4}-\d{2}-\d{2}$/.test(v.trim())) return v.trim();
    const d = new Date(v);
    if(!isNaN(d)) return d.toISOString().slice(0,10);
    return null;
  }

  async function handleImportFile(e){
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    setImporting(true); setImportSummary(null);
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:"array", cellDates:true});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:""});

      const existingKeys = new Set(entries.map(dedupKey));
      const seenThisImport = new Set();
      const rateCache2 = new Map();
      const toAdd = [];
      let skippedDup=0, errored=0;
      const newCats = new Set(categories);
      const newVendors = new Set(vendors);

      for(const row of rows){
        const rawDate = pickField(row,["date"]);
        const rawVendor = pickField(row,["vendor","payee","merchant"]);
        const rawAmount = pickField(row,["amount (original)","amount (php)","original amount","amount"]);
        const rawCurrency = pickField(row,["currency","currency code"]) || "PHP";
        const rawCategory = pickField(row,["category"]) || "Other";
        const rawSubmittedBy = pickField(row,["submitted by","submittedby","by"]) || "";
        const rawComments = pickField(row,["comments","notes","comment"]) || "";
        const rawStatus = pickField(row,["status"]) || "Pending";

        const date = parseDateValue(rawDate);
        const amount = parseFloat(rawAmount);
        const currency = String(rawCurrency).trim().toUpperCase();
        const vendor = String(rawVendor||"").trim();
        const status = STATUSES.includes(rawStatus) ? rawStatus : "Pending";

        if(!date || !vendor || !amount || amount<=0){ errored++; continue; }

        const key = `${date}|${vendor.toLowerCase()}|${currency}|${amount.toFixed(2)}`;
        if(existingKeys.has(key) || seenThisImport.has(key)){ skippedDup++; continue; }
        seenThisImport.add(key);

        const cacheKey = `${currency}|${date}`;
        let rateInfo = rateCache2.get(cacheKey);
        if(rateInfo===undefined){
          rateInfo = await fetchRateWithFallback(currency,date,rateCache);
          rateCache2.set(cacheKey,rateInfo);
          if(rateInfo.source==="exact" || rateInfo.source==="nearby") updateRateCache(currency, rateInfo.rate, rateInfo.usedDate);
        }

        toAdd.push({
          id:`${Date.now()}-${Math.random().toString(36).slice(2,8)}`,
          date, amount, currency, vendor, category:String(rawCategory).trim()||"Other",
          comments:String(rawComments).trim(), submittedBy:String(rawSubmittedBy).trim(),
          receipt:null, amountCAD:amount*rateInfo.rate, rate:rateInfo.rate, rateDate:rateInfo.usedDate,
          rateSource:rateInfo.source, status, approvedBy:null, approvedAt:null, createdAt:Date.now(),
        });
        newCats.add(String(rawCategory).trim()||"Other");
        if(vendor) newVendors.add(vendor);
      }

      if(toAdd.length>0) await batchWriteEntries(toAdd);
      if(newCats.size>categories.length) await writeCategories(Array.from(newCats));
      if(newVendors.size>vendors.length) await writeVendors(Array.from(newVendors));

      setImportSummary({added:toAdd.length, skipped:skippedDup, errored, total:rows.length});
      showToast(`Imported ${toAdd.length} new ${toAdd.length===1?"entry":"entries"}`);
    } catch(err){
      setImportSummary({added:0,skipped:0,errored:0,total:0,fileError:true});
      showToast("Couldn't read that file — check it's a valid CSV or Excel file");
    } finally {
      setImporting(false);
      if(fileInputRef.current) fileInputRef.current.value = "";
    }
  }

  const filtered = useMemo(()=>{
    let list = entries.filter(en=>{
      const matchesCat = categoryFilter==="All" || en.category===categoryFilter;
      const matchesStatus = statusFilter==="All" || en.status===statusFilter;
      const q = search.trim().toLowerCase();
      const matchesSearch = !q || en.vendor.toLowerCase().includes(q) || en.category.toLowerCase().includes(q) || (en.comments||"").toLowerCase().includes(q) || (en.submittedBy||"").toLowerCase().includes(q);
      return matchesCat && matchesStatus && matchesSearch;
    });
    list = list.slice().sort((a,b)=>{
      let av=a[sortKey], bv=b[sortKey];
      if(sortKey==="date"){ av=new Date(a.date).getTime(); bv=new Date(b.date).getTime(); }
      else if(sortKey==="amountCAD"||sortKey==="amount"){ av=Number(av); bv=Number(bv); }
      else { av=String(av||"").toLowerCase(); bv=String(bv||"").toLowerCase(); }
      if(av<bv) return sortDir==="asc"?-1:1;
      if(av>bv) return sortDir==="asc"?1:-1;
      return 0;
    });
    return list;
  },[entries,search,categoryFilter,statusFilter,sortKey,sortDir]);

  const totalCAD = filtered.reduce((s,e)=>s+e.amountCAD,0);

  const byCategory = useMemo(()=>{
    const map={}; filtered.forEach(e=>{ map[e.category]=(map[e.category]||0)+e.amountCAD; });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  },[filtered]);

  const monthlyGroups = useMemo(()=>{
    const map={};
    filtered.forEach(e=>{
      const ym = e.date.slice(0,7);
      if(!map[ym]) map[ym]={total:0,count:0,byCategory:{},byVendor:{}};
      map[ym].total += e.amountCAD; map[ym].count += 1;
      map[ym].byCategory[e.category]=(map[ym].byCategory[e.category]||0)+e.amountCAD;
      map[ym].byVendor[e.vendor]=(map[ym].byVendor[e.vendor]||0)+e.amountCAD;
    });
    return Object.entries(map).sort((a,b)=> a[0]<b[0]?1:-1);
  },[filtered]);

  const overallByVendor = useMemo(()=>{
    const map={}; filtered.forEach(e=>{ map[e.vendor]=(map[e.vendor]||0)+e.amountCAD; });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  },[filtered]);

  function toggleMonth(ym){ setExpandedMonths(s=>({...s,[ym]:!s[ym]})); }

  async function offerDownload(blob, filename){
    try {
      const file = new File([blob], filename, { type: blob.type });
      if(navigator.canShare && navigator.canShare({ files: [file] })){
        await navigator.share({ files: [file], title: filename });
        return;
      }
    } catch(err){
      // share cancelled or unsupported — fall back to a normal download below
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  async function shareViaMessaging(){
    try {
      const header = ["Date","Vendor","Category","Submitted By","Status","Amount (Original)","Currency","Rate (to CAD)","Amount (CAD)","Comments"];
      const rows = filtered.map(e=>[e.date,`"${(e.vendor||"").replace(/"/g,'""')}"`,e.category||"",`"${(e.submittedBy||"").replace(/"/g,'""')}"`,e.status||"Pending",Number(e.amount||0).toFixed(2),e.currency||"PHP",Number(e.rate||0).toFixed(6),Number(e.amountCAD||0).toFixed(2),`"${(e.comments||"").replace(/"/g,'""')}"`]);
      const csv = [header,...rows].map(r=>r.join(",")).join("\n");
      const filename = `expenses-${new Date().toISOString().slice(0,10)}.csv`;
      const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
      const file = new File([blob], filename, { type: "text/csv" });
      if(navigator.canShare && navigator.canShare({ files: [file] })){
        await navigator.share({ files: [file], title: filename, text: `Expense Ledger export — ${filtered.length} ${filtered.length===1?"entry":"entries"}, total ${fmtCAD(totalCAD)}` });
        setShowExportMenu(false);
        return;
      }
      // no Share Sheet available — fall back to a mailto link with the data in the body
      const subject = encodeURIComponent(`Expense Ledger — ${new Date().toISOString().slice(0,10)}`);
      const body = encodeURIComponent(`${filtered.length} expense${filtered.length===1?"":"s"}, total ${fmtCAD(totalCAD)}\n\n${csv}`);
      window.location.href = `mailto:?subject=${subject}&body=${body}`;
      setShowExportMenu(false);
    } catch(err){
      console.error("Share failed:", err);
      showToast("Couldn't open the share sheet — " + (err.message || "unknown error"));
    }
  }

  function exportCSV(){
    try {
      const header = ["Date","Vendor","Category","Submitted By","Status","Amount (Original)","Currency","Rate (to CAD)","Amount (CAD)","Comments"];
      const rows = filtered.map(e=>[e.date,`"${(e.vendor||"").replace(/"/g,'""')}"`,e.category||"",`"${(e.submittedBy||"").replace(/"/g,'""')}"`,e.status||"Pending",Number(e.amount||0).toFixed(2),e.currency||"PHP",Number(e.rate||0).toFixed(6),Number(e.amountCAD||0).toFixed(2),`"${(e.comments||"").replace(/"/g,'""')}"`]);
      const csv = [header,...rows].map(r=>r.join(",")).join("\n");
      const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
      offerDownload(blob, `expenses-${new Date().toISOString().slice(0,10)}.csv`);
      setShowExportMenu(false);
    } catch(err){
      console.error("CSV export failed:", err);
      showToast("CSV export failed — " + (err.message || "unknown error"));
    }
  }

  function exportExcel(){
    try {
      const data = filtered.map(e=>({Date:e.date,Vendor:e.vendor||"",Category:e.category||"","Submitted By":e.submittedBy||"",Status:e.status||"Pending","Amount (Original)":Number(e.amount||0),Currency:e.currency||"PHP","Rate (to CAD)":Number((e.rate||0).toFixed(6)),"Amount (CAD)":Number((e.amountCAD||0).toFixed(2)),Comments:e.comments||""}));
      const ws = XLSX.utils.json_to_sheet(data);
      ws["!cols"]=[{wch:11},{wch:20},{wch:18},{wch:16},{wch:10},{wch:14},{wch:9},{wch:12},{wch:14},{wch:30}];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws,"Expenses");
      const monthlyData = monthlyGroups.map(([ym,g])=>({Month:monthLabel(ym),"Total (CAD)":Number(g.total.toFixed(2)),"# Entries":g.count}));
      monthlyData.push({Month:"Grand Total","Total (CAD)":Number(totalCAD.toFixed(2)),"# Entries":filtered.length});
      const ws2 = XLSX.utils.json_to_sheet(monthlyData); ws2["!cols"]=[{wch:20},{wch:14},{wch:10}];
      XLSX.utils.book_append_sheet(wb,ws2,"Monthly Summary");
      const catData = byCategory.map(([c,amt])=>({Category:c,"Total (CAD)":Number(amt.toFixed(2))}));
      const ws3 = XLSX.utils.json_to_sheet(catData); ws3["!cols"]=[{wch:22},{wch:14}];
      XLSX.utils.book_append_sheet(wb,ws3,"By Category");
      const venData = overallByVendor.map(([v,amt])=>({Vendor:v,"Total (CAD)":Number(amt.toFixed(2))}));
      const ws4 = XLSX.utils.json_to_sheet(venData); ws4["!cols"]=[{wch:22},{wch:14}];
      XLSX.utils.book_append_sheet(wb,ws4,"By Vendor");
      const wbBytes = XLSX.write(wb, { bookType: "xlsx", type: "array" });
      const blob = new Blob([wbBytes], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
      offerDownload(blob, `expenses-${new Date().toISOString().slice(0,10)}.xlsx`);
      setShowExportMenu(false);
    } catch(err){
      console.error("Excel export failed:", err);
      showToast("Excel export failed — " + (err.message || "unknown error"));
    }
  }

  const SortHeader = ({label,sortk,className=""}) => (
    <button onClick={()=>toggleSort(sortk)} className={`flex items-center gap-1 text-left whitespace-nowrap ${className}`}>
      {label}<span className={sortKey===sortk?"opacity-100":"opacity-30"}>↕</span>
    </button>
  );

  const allVisibleSelected = filtered.length>0 && filtered.every(en=>selected[en.id]);
  const selectedCount = Object.keys(selected).length;
  const undoPct = pendingDelete ? Math.max(0, Math.min(100, ((pendingDelete.expiresAt - Date.now())/UNDO_WINDOW_MS)*100)) : 0;

  return (

            <div>
              <h1 className="ledger-font text-2xl font-semibold text-stone-900 leading-none">Expense Ledger</h1>
              <p className="text-xs text-stone-500 mt-1">Any currency, converted to CAD at the day's rate</p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            {cloudConfigured && (
              <button onClick={toggleOffline} title={isOffline ? "Switch back online to sync" : "Work offline for now"}
                className={`flex items-center gap-1.5 rounded-full border px-3 py-1 text-xs font-medium ${isOffline ? "border-stone-400 bg-stone-200 text-stone-700" : "border-emerald-300 bg-emerald-50 text-emerald-800"}`}>
                {isOffline ? "📴 Offline" : "☁️ Online"}
              </button>
            )}
            <label className="text-xs text-stone-500">Acting as</label>
            <input type="text" placeholder="Your name" value={userName} onChange={e=>handleUserNameChange(e.target.value)} className="w-32 rounded border border-stone-300 px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-emerald-800" />
          </div>
        </div>
      </header>

      <main className="mx-auto max-w-5xl px-4 py-6 sm:px-8 space-y-6">
        <div className={`flex items-start gap-2 rounded border px-4 py-3 text-xs ${useCloud ? "border-emerald-300 bg-emerald-50 text-emerald-800" : "border-stone-300 bg-stone-100 text-stone-600"}`}>
          <span>{merging ? "🔄" : useCloud ? "☁️" : cloudConfigured ? "📴" : "📵"}</span>
          {merging
            ? <span>Syncing your offline entries to the cloud…</span>
            : useCloud
            ? <span>Shared cloud storage is on — entries sync automatically across every device using this app.{syncError && " (Having trouble reaching the cloud right now — check your connection or Firestore rules.)"}</span>
            : cloudConfigured

        <form onSubmit={handleSubmit} className="rounded border border-stone-300 bg-white p-4 sm:p-6 space-y-4">
          <div className="flex items-center justify-between">
            <h2 className="ledger-font text-lg font-semibold text-stone-900">{editingId?"Edit expense":"New expense"}</h2>
            {editingId && <button type="button" onClick={cancelEdit} className="flex items-center gap-1 text-xs text-stone-500 hover:text-stone-800">✕ Cancel edit</button>}
          </div>

          <div className="rounded border border-dashed border-stone-300 bg-stone-50 p-3">

            <div className="flex flex-wrap items-center gap-2">
              <label className="flex items-center gap-1.5 rounded border border-stone-300 bg-white px-3 py-2 text-xs text-stone-600 cursor-pointer hover:bg-stone-100">
                📷 {form.receipt?"Replace photo":"Add photo"}
                <input type="file" accept="image/*" onChange={handleReceiptChange} className="hidden" />
              </label>
              {form.receipt && <>
                <img src={form.receipt} alt="Receipt preview" className="h-12 w-12 rounded object-cover border border-stone-300" />
                <button type="button" onClick={()=>setForm({...form,receipt:null})} className="text-stone-400 hover:text-red-700">✕</button>
              </>}
            </div>
            {imgError && <p className="mt-1.5 text-[11px] text-red-700">{imgError}</p>}
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label className="block text-xs font-medium text-stone-600 mb-1">Date</label>
              <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} className="w-full rounded border border-stone-300 px-3 py-2 text-sm data-font focus:outline-none focus:ring-2 focus:ring-emerald-800" />
            </div>
            <div>
              <label className="block text-xs font-medium text-stone-600 mb-1">Amount</label>
              <div className="flex gap-1.5">
                <select value={form.currency} onChange={e=>setForm({...form,currency:e.target.value})} className="w-24 rounded border border-stone-300 px-2 py-2 text-sm bg-white data-font focus:outline-none focus:ring-2 focus:ring-emerald-800">
                  {CURRENCIES.map(([code])=> <option key={code} value={code}>{code}</option>)}
                </select>
                <input type="number" step="0.01" min="0" placeholder="0.00" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} className="flex-1 rounded border border-stone-300 px-3 py-2 text-sm data-font focus:outline-none focus:ring-2 focus:ring-emerald-800" />
              </div>
              <p className="mt-1 text-xs data-font text-stone-500">
                {previewLoading?"converting…"
                  :previewRateInfo && previewRateInfo.source==="unknown"?"no rate found yet for this currency — will save with a placeholder; edit later to fix"
                  :previewRateInfo && previewRateInfo.source==="cached"?`≈ ${fmtCAD(parseFloat(form.amount||0)*(previewRate||0))} CAD (exchange service down — using last known rate from ${previewRateInfo.usedDate})`
                  :previewRateInfo && previewRateInfo.source==="nearby"?`≈ ${fmtCAD(parseFloat(form.amount||0)*(previewRate||0))} CAD (rate from ${previewRateInfo.usedDate})`
                  :previewRate!=null&&form.amount?`≈ ${fmtCAD(parseFloat(form.amount||0)*previewRate)} CAD`
                  :previewRate!=null?`rate: 1 ${form.currency} = ${previewRate.toFixed(4)} CAD`:""}
              </p>
            </div>
            <div>
              <div className="flex items-center justify-between mb-1">
                <label className="block text-xs font-medium text-stone-600">Vendor</label>
                <button type="button" onClick={()=>setShowVendorManager(s=>!s)} className="flex items-center gap-1 text-[11px] text-stone-400 hover:text-emerald-800">⚙ Manage</button>
              </div>
              {!showNewVendor ? (
                <select value={vendors.includes(form.vendor)?form.vendor:""} onChange={handleVendorSelect} className="w-full rounded border border-stone-300 px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-emerald-800">
                  <option value="" disabled>{form.vendor && !vendors.includes(form.vendor) ? form.vendor : "Select vendor…"}</option>
                  {vendors.map(v=> <option key={v} value={v}>{v}</option>)}
                  <option value="__new__">+ Add new vendor…</option>
                </select>
              ) : (
                <div className="flex items-center gap-1.5">
                  <input autoFocus type="text" placeholder="New vendor name" value={newVendorText} onChange={e=>setNewVendorText(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); confirmNewVendor(); } }} className="flex-1 rounded border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-800" />
                  <button type="button" onClick={confirmNewVendor} className="rounded bg-emerald-900 p-2 text-white">✓</button>
                  <button type="button" onClick={()=>{setShowNewVendor(false);setNewVendorText("");}} className="rounded border border-stone-300 p-2 text-stone-500">✕</button>
                </div>
              )}
              {showVendorManager && (
                <div className="mt-2 rounded border border-stone-200 bg-stone-50 p-2 space-y-1.5 max-h-48 overflow-y-auto">
                  {vendors.length===0 && <p className="text-[11px] text-stone-400">No vendors yet — add one above.</p>}
                  {vendors.map(v=>(
                    <div key={v} className="flex items-center gap-1.5">
                      <input value={vendorEdits[v]??v} onChange={e=>setVendorEdits({...vendorEdits,[v]:e.target.value})} className="flex-1 rounded border border-stone-300 px-2 py-1 text-xs" />
                      <button type="button" onClick={()=>{renameVendor(v,vendorEdits[v]??v); setVendorEdits(s=>{const c={...s};delete c[v];return c;});}} className="text-stone-400 hover:text-emerald-800">💾</button>
                      <button type="button" onClick={()=>deleteVendor(v)} className="text-stone-400 hover:text-red-700">🗑</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div>
              <div className="flex items-center justify-between mb-1">
                <label className="block text-xs font-medium text-stone-600">Category</label>
                <button type="button" onClick={()=>setShowCatManager(s=>!s)} className="flex items-center gap-1 text-[11px] text-stone-400 hover:text-emerald-800">⚙ Manage</button>
              </div>
              <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} className="w-full rounded border border-stone-300 px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-emerald-800">
                {categories.map(c=> <option key={c} value={c}>{c}</option>)}
              </select>
              {showCatManager && (
                <div className="mt-2 rounded border border-stone-200 bg-stone-50 p-2 space-y-1.5 max-h-48 overflow-y-auto">
                  {categories.map(c=>(
                    <div key={c} className="flex items-center gap-1.5">
                      <span className="h-2 w-2 rounded-full shrink-0" style={{backgroundColor: colorFor(c)}} />
                      <input value={catEdits[c]??c} onChange={e=>setCatEdits({...catEdits,[c]:e.target.value})} className="flex-1 rounded border border-stone-300 px-2 py-1 text-xs" />
                      <button type="button" onClick={()=>{renameCategory(c,catEdits[c]??c); setCatEdits(s=>{const n={...s};delete n[c];return n;});}} className="text-stone-400 hover:text-emerald-800">💾</button>
                      <button type="button" onClick={()=>deleteCategory(c)} className="text-stone-400 hover:text-red-700">🗑</button>
                    </div>
                  ))}
                  <div className="flex items-center gap-1.5 pt-1 border-t border-stone-200">
                    <input placeholder="New category" value={newCatText} onChange={e=>setNewCatText(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); addCategory(); } }} className="flex-1 rounded border border-stone-300 px-2 py-1 text-xs" />
                    <button type="button" onClick={addCategory} className="text-stone-400 hover:text-emerald-800">+</button>
                  </div>
                </div>
              )}
            </div>
            <div>
              <label className="block text-xs font-medium text-stone-600 mb-1">Submitted by</label>
              <input type="text" placeholder="Name" value={form.submittedBy} onChange={e=>handleSubmittedByChange(e.target.value)} className="w-full rounded border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-800" />
            </div>
            <div className="sm:col-span-2">
              <label className="block text-xs font-medium text-stone-600 mb-1">Comments</label>
              <textarea rows={2} placeholder="Optional notes" value={form.comments} onChange={e=>setForm({...form,comments:e.target.value})} className="w-full rounded border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-800" />
            </div>
          </div>

          {formError && <p className="flex items-center gap-1.5 text-xs text-red-700">⚠️ {formError}</p>}

          <button type="submit" disabled={submitting} className="flex items-center gap-2 rounded px-4 py-2.5 text-sm font-medium text-stone-50 hover:opacity-90 disabled:opacity-60" style={{background:"linear-gradient(135deg,#0F766E,#064e3b)"}}>
            {submitting ? "Converting…" : editingId ? "✓ Save changes" : "+ Add expense"}
          </button>
        </form>

        <div className="flex flex-wrap items-center gap-2">
          <div className="relative flex-1 min-w-[160px]">
            <span className="absolute left-2.5 top-2 text-stone-400">🔍</span>
            <input type="text" placeholder="Search vendor, category, submitter…" value={search} onChange={e=>setSearch(e.target.value)} className="w-full rounded border border-stone-300 bg-white pl-8 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-800" />
          </div>
          <select value={categoryFilter} onChange={e=>setCategoryFilter(e.target.value)} className="rounded border border-stone-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-800">
            <option value="All">All categories</option>
            {categories.map(c=> <option key={c} value={c}>{c}</option>)}
          </select>
          <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} className="rounded border border-stone-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-800">
            <option value="All">All statuses</option>
            {STATUSES.map(s=> <option key={s} value={s}>{s}</option>)}
          </select>
          <button onClick={()=>fileInputRef.current && fileInputRef.current.click()} disabled={importing} className="flex items-center gap-1.5 rounded border border-stone-300 bg-white px-3 py-2 text-xs font-medium text-stone-700 hover:bg-stone-100 disabled:opacity-50">
            📥 {importing?"Importing…":"Import"}
          </button>
          <input ref={fileInputRef} type="file" accept=".csv,.xlsx,.xls" onChange={handleImportFile} className="hidden" />
          <button onClick={()=>setShowExportMenu(true)} disabled={filtered.length===0} className="flex items-center gap-1.5 rounded border px-3 py-2 text-xs font-medium text-stone-50 hover:opacity-90 disabled:opacity-40" style={{background:"linear-gradient(135deg,#0F766E,#064e3b)", borderColor:"#064e3b"}}>📤 Export</button>
        </div>

        {importSummary && (
          <div className={`rounded border px-4 py-2.5 text-xs flex items-center justify-between ${importSummary.fileError?"border-red-300 bg-red-50 text-red-800":"border-emerald-300 bg-emerald-50 text-emerald-800"}`}>
            {importSummary.fileError ? <span>Couldn't read that file — make sure it's a CSV or Excel file with Date, Vendor, and Amount columns.</span>
              : <span><strong>{importSummary.added}</strong> added · <strong>{importSummary.skipped}</strong> duplicates skipped · <strong>{importSummary.errored}</strong> rows had missing/invalid data (out of {importSummary.total} rows)</span>}
            <button onClick={()=>setImportSummary(null)} className="text-current opacity-60 hover:opacity-100">✕</button>
          </div>
        )}

        {selectedCount>0 && (
          <div className="flex items-center justify-between rounded border border-violet-300 bg-violet-50 px-4 py-2.5">
            <span className="text-xs font-medium text-violet-800">{selectedCount} selected</span>
            <div className="flex items-center gap-3">
              <button onClick={clearSelection} className="text-xs text-violet-700 hover:text-violet-900">Clear</button>
              <button onClick={deleteSelected} className="flex items-center gap-1.5 rounded bg-red-700 px-3 py-1.5 text-xs font-medium text-white hover:bg-red-800">🗑 Delete selected</button>
            </div>
          </div>
        )}

        <div className="rounded border border-stone-300 bg-white overflow-x-auto">
          {!loaded ? <div className="p-8 text-center text-sm text-stone-400">Loading expenses…</div>
            : filtered.length===0 ? <div className="p-8 text-center text-sm text-stone-400">{entries.length===0 ? "No expenses yet. Add your first one above, or import a file." : "No expenses match your search or filter."}</div>
            : (
            <table className="greenbar w-full text-sm">
              <thead>
                <tr className="border-b-2 border-stone-900 text-xs uppercase tracking-wide text-stone-600">
                  <th className="px-3 py-2 w-8"><input type="checkbox" checked={allVisibleSelected} onChange={e=>selectAllVisible(filtered.map(f=>f.id), e.target.checked)} /></th>
                  <th className="px-3 py-2"><SortHeader label="Date" sortk="date" /></th>
                  <th className="px-3 py-2"><SortHeader label="Vendor" sortk="vendor" /></th>
                  <th className="px-3 py-2"><SortHeader label="Category" sortk="category" /></th>
                  <th className="px-3 py-2">By</th>
                  <th className="px-3 py-2">Status</th>
                  <th className="px-3 py-2 text-right"><SortHeader label="Amount" sortk="amount" className="justify-end" /></th>
                  <th className="px-3 py-2 text-right"><SortHeader label="CAD" sortk="amountCAD" className="justify-end" /></th>
                  <th className="px-3 py-2">Receipt</th>
                  <th className="px-3 py-2"></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(en=>(
                  <tr key={en.id} className={`border-b border-stone-200 align-top ${selected[en.id]?"bg-violet-50":""}`}>
                    <td className="px-3 py-2"><input type="checkbox" checked={!!selected[en.id]} onChange={()=>toggleSelect(en.id)} /></td>
                    <td className="px-3 py-2 whitespace-nowrap data-font text-stone-700">{en.date}</td>
                    <td className="px-3 py-2 text-stone-900 font-medium">{en.vendor}</td>
                    <td className="px-3 py-2 text-stone-600"><CategoryDot category={en.category} />{en.category}</td>
                    <td className="px-3 py-2 text-stone-500">{en.submittedBy||"—"}</td>
                    <td className="px-3 py-2"><StatusBadge status={en.status||"Pending"} /></td>
                    <td className="px-3 py-2 text-right data-font text-stone-700 whitespace-nowrap"><CurrencyChip code={en.currency} />{fmtAmount(en.amount, en.currency)}</td>
                    <td className="px-3 py-2 text-right data-font font-semibold text-emerald-900 whitespace-nowrap">
                      {fmtCAD(en.amountCAD)}
                      {en.rateSource && en.rateSource!=="exact" && (
                        <span title={
                          en.rateSource==="nearby" ? `Rate from ${en.rateDate} (closest available to ${en.date})`
                          : en.rateSource==="cached" ? `Exchange service was unavailable — used last known rate from ${en.rateDate}`
                          : "Exchange rate was unavailable — placeholder 1:1 rate used, edit to fix"
                        } className="ml-1 text-amber-600 cursor-help">≈</span>
                      )}
                    </td>
                    <td className="px-3 py-2">{en.receipt ? <button onClick={()=>setLightbox(en.receipt)}><img src={en.receipt} alt="Receipt" className="h-9 w-9 rounded object-cover border border-stone-300" /></button> : <span className="text-stone-300 text-xs">—</span>}</td>
                    <td className="px-3 py-2">
                      <div className="flex items-center gap-2 justify-end">
                        {en.status!=="Approved" && <button onClick={()=>setStatus(en.id,"Approved")} title="Approve" className="text-stone-400 hover:text-emerald-700">✅</button>}
                        {en.status!=="Rejected" && <button onClick={()=>setStatus(en.id,"Rejected")} title="Reject" className="text-stone-400 hover:text-red-700">❌</button>}
                        <button onClick={()=>startEdit(en)} title="Edit" className="text-stone-400 hover:text-emerald-900">✎</button>
                        <button onClick={()=>deleteEntry(en.id)} title="Delete" className="text-stone-400 hover:text-red-700">🗑</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>

        {filtered.length>0 && (
          <div className="rounded border-2 border-dashed border-stone-400 bg-white perforation px-5 py-4">
            <div className="data-font text-xs text-stone-500 mb-2">{filtered.length} {filtered.length===1?"entry":"entries"}</div>
            <div className="flex items-baseline justify-between">
              <span className="ledger-font text-stone-800">Total</span>
              <div className="data-font text-xl font-semibold text-emerald-900">{fmtCAD(totalCAD)}</div>
            </div>
            {byCategory.length>1 && (
              <div className="mt-3 pt-3 border-t border-stone-200 space-y-1">
                {byCategory.map(([cat,amt])=>(
                  <div key={cat} className="flex items-center justify-between text-xs">
                    <span className="text-stone-500 flex items-center"><CategoryDot category={cat} />{cat}</span><span className="data-font text-stone-700">{fmtCAD(amt)}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {monthlyGroups.length>0 && (
          <div className="space-y-2">
            <h3 className="ledger-font text-base font-semibold text-stone-900 px-1">Month by month</h3>
            {monthlyGroups.map(([ym,g])=>{
              const catList = Object.entries(g.byCategory).sort((a,b)=>b[1]-a[1]);
              const venList = Object.entries(g.byVendor).sort((a,b)=>b[1]-a[1]);
              const isOpen = !!expandedMonths[ym];
              return (
                <div key={ym} className="rounded border border-stone-300 bg-white border-l-4" style={{borderLeftColor:"#A8823C"}}>
                  <button onClick={()=>toggleMonth(ym)} className="w-full flex items-center justify-between px-4 py-3">
                    <span className="flex items-baseline gap-2">
                      <span className="ledger-font text-stone-900 font-semibold">{monthLabel(ym)}</span>
                      <span className="text-xs text-stone-400">{g.count} {g.count===1?"entry":"entries"}</span>
                    </span>
                    <span className="flex items-center gap-2">
                      <span className="data-font text-sm font-semibold text-emerald-900">{fmtCAD(g.total)}</span>
                      <span className="text-stone-400">{isOpen?"▴":"▾"}</span>
                    </span>
                  </button>
                  {isOpen && (
                    <div className="px-4 pb-4 grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div>
                        <p className="text-[11px] uppercase tracking-wide text-stone-400 mb-1.5">By category</p>
                        <div className="space-y-1">
                          {catList.map(([c,amt])=>(
                            <div key={c} className="flex items-center justify-between text-xs">
                              <span className="text-stone-600 flex items-center"><CategoryDot category={c} />{c}</span><span className="data-font text-stone-700">{fmtCAD(amt)}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                      <div>
                        <p className="text-[11px] uppercase tracking-wide text-stone-400 mb-1.5">By vendor</p>
                        <div className="space-y-1">
                          {venList.map(([v,amt])=>(
                            <div key={v} className="flex items-center justify-between text-xs">
                              <span className="text-stone-600">{v}</span><span className="data-font text-stone-700">{fmtCAD(amt)}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        <p className="text-center text-xs text-stone-400 pb-10">{useCloud ? "Synced across devices" : "Installed as an app · data stays on this device"}</p>
      </main>

      {lightbox && <div onClick={()=>setLightbox(null)} className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-6"><img src={lightbox} alt="Receipt full size" className="max-h-full max-w-full rounded shadow-xl" /></div>}

      {showExportMenu && (
        <div onClick={()=>setShowExportMenu(false)} className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 p-4">
          <div onClick={e=>e.stopPropagation()} className="w-full max-w-sm rounded-lg bg-white p-5 shadow-xl">
            <div className="flex items-center justify-between mb-1">
              <h3 className="ledger-font text-lg font-semibold text-stone-900">Export</h3>
              <button onClick={()=>setShowExportMenu(false)} className="text-stone-400 hover:text-stone-700">✕</button>
            </div>
            <p className="text-xs text-stone-500 mb-4">{filtered.length} {filtered.length===1?"entry":"entries"} · total {fmtCAD(totalCAD)}</p>
            <div className="grid grid-cols-2 gap-2 mb-2">
              <button onClick={exportExcel} className="flex flex-col items-center gap-1 rounded border border-stone-300 bg-white py-4 text-sm font-medium text-stone-700 hover:bg-stone-50">
                <span className="text-2xl">📊</span> Excel (.xlsx)
              </button>
              <button onClick={exportCSV} className="flex flex-col items-center gap-1 rounded border border-stone-300 bg-white py-4 text-sm font-medium text-stone-700 hover:bg-stone-50">
                <span className="text-2xl">📄</span> CSV (.csv)
              </button>
            </div>
            <button onClick={shareViaMessaging} className="w-full flex items-center justify-center gap-2 rounded py-3 text-sm font-medium text-white hover:opacity-90" style={{background:"linear-gradient(135deg,#0F766E,#064e3b)"}}>
              ✉️ Send via Mail, Messages, WhatsApp…
            </button>
            <p className="text-[11px] text-stone-400 mt-2 text-center">Opens your device's share sheet so you can pick where it goes.</p>
          </div>
        </div>
      )}
      {toast && <div className="fixed bottom-5 left-1/2 -translate-x-1/2 rounded bg-stone-900 px-4 py-2 text-sm text-stone-50 shadow-lg">{toast}</div>}

      {pendingDelete && (
        <div className="fixed bottom-5 left-1/2 -translate-x-1/2 w-[92%] max-w-sm overflow-hidden rounded-lg bg-stone-900 text-stone-50 shadow-xl">
          <div className="flex items-center justify-between px-4 py-3">
            <span className="text-sm">{pendingDelete.ids.length} expense{pendingDelete.ids.length>1?"s":""} deleted</span>
            <button onClick={undoDelete} className="flex items-center gap-1.5 rounded bg-stone-50 px-3 py-1.5 text-xs font-semibold text-stone-900 hover:bg-stone-200">↶ Undo</button>
          </div>
          <div className="h-1 bg-stone-700"><div className="h-full bg-amber-500" style={{width:`${undoPct}%`, transition:"width 100ms linear"}} /></div>
        </div>
      )}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<ExpenseTracker />);
  window.__appRendered = true;
} catch (err) {
  document.getElementById("root").innerHTML =
    '<div style="font-family:sans-serif;padding:24px;max-width:600px;margin:0 auto;">' +
    '<h2 style="color:#b91c1c;">Something went wrong loading the app</h2>' +
    '<p>Please copy the text below and share it so this can be fixed:</p>' +
    '<pre style="background:#f3f4f6;padding:12px;border-radius:8px;white-space:pre-wrap;font-size:12px;">' +
    (err && err.stack ? err.stack : String(err)) + '</pre></div>';
  console.error(err);
}
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }
</script>
</body>
</html>
