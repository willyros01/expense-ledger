<style>
  :root{
    --bg:#F2F2F7;
    --card:#FFFFFF;
    --ink:#0B0B0F;
    --muted:#8A8A8E;
    --line:#E5E5EA;
    --blue:#2F7DF6;
    --blue-soft:#E8F1FE;
    --red:#DC3B30;
    --red-soft:#FBEAE8;
    --amber:#B4801A;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ max-width:620px; margin:0 auto; padding:6px 16px 150px; }

  .pagehead{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; padding:16px 4px 20px; }
  .h1{ font-size:34px; font-weight:800; letter-spacing:-0.7px; margin:0; }
  .rateblock{ text-align:right; font-size:13px; color:var(--muted); line-height:1.4; padding-top:8px; white-space:nowrap; }
  .ratenum{ color:var(--ink); font-weight:700; }
  .ratesub{ font-size:12px; }
  .offbadge{ display:inline-block; background:#EFEFF4; color:#6B6B70; border:1px solid #DFDFE4;
             border-radius:20px; padding:2px 9px; font-size:11px; font-weight:700; margin-bottom:5px; }

  .card{ background:var(--card); border-radius:16px; padding:16px; }
  .card.tblcard{ padding:0; overflow:hidden; }
  .card.empty{ color:var(--muted); font-size:14px; text-align:center; padding:26px 16px; }
  .cardtitle{ font-size:16px; font-weight:700; letter-spacing:-0.2px; margin-bottom:4px; }
  .cardbody{ font-size:13.5px; color:var(--muted); line-height:1.5; margin-bottom:12px; }

  .seclabel{ font-size:13px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin:24px 4px 8px; }

  .btn{ border:0; border-radius:10px; padding:12px 10px; font-size:15px; font-weight:700;
        font-family:inherit; width:100%; cursor:pointer; line-height:1.2; }
  .btn-soft{ background:var(--blue-soft); color:var(--blue); }
  .btn-danger{ background:var(--red-soft); color:var(--red); }
  .btn-plain{ background:#EFEFF4; color:var(--muted); }
  .btn-primary{ background:var(--blue); color:#fff; border-radius:12px; padding:15px; font-size:16px; }
  .btn:disabled{ opacity:.4; cursor:default; }
  .btnrow{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:12px; }
  .btnrow2{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }

  .linkbtn{ background:none; border:0; color:var(--blue); font-family:inherit; font-size:13.5px; font-weight:600; cursor:pointer; padding:4px 2px; }
  .linkbtn.danger{ color:var(--red); }

  .fld{ width:100%; border:1px solid var(--line); border-radius:10px; padding:11px 12px;
        font-size:16px; font-family:inherit; background:#fff; color:var(--ink); }
  .fld:focus{ outline:none; border-color:var(--blue); }
  select.fld{ appearance:none; -webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%238A8A8E' stroke-width='1.8' fill='none' stroke-linecap='round'/></svg>");
    background-repeat:no-repeat; background-position:right 12px center; padding-right:32px; }
  .lbl{ font-size:13px; font-weight:600; color:var(--muted); margin-bottom:6px; display:block; }
  .lblrow{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .hint{ font-size:12.5px; color:var(--muted); margin-top:6px; line-height:1.45; }
  .err{ color:var(--red); font-size:13.5px; font-weight:600; }
  .notice{ display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:13.5px; color:var(--muted); padding:12px 16px; }

  .photorow{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .photobtn{ width:auto; padding:10px 14px; display:inline-flex; align-items:center; }
  .thumb{ width:52px; height:52px; border-radius:8px; object-fit:cover; border:1px solid var(--line); flex:0 0 auto; cursor:pointer; }

  .manager{ margin-top:10px; border-top:1px solid var(--line); padding-top:10px; max-height:230px; overflow-y:auto; }
  .managerrow{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .managerrow .fld{ padding:8px 10px; font-size:14px; }
  .dot{ width:8px; height:8px; border-radius:50%; flex:0 0 auto; display:inline-block; margin-right:8px; vertical-align:middle; }

  .filters{ display:flex; gap:8px; margin-bottom:10px; }
  .tally{ font-size:13px; color:var(--muted); font-weight:600; margin:4px 4px 12px; }
  .selbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; font-size:14px; font-weight:600; padding:12px 14px; }

  .expcard{ margin-bottom:12px; }
  .exprow{ display:flex; gap:12px; align-items:flex-start; }
  .expmain{ flex:1; min-width:0; }
  .expamt{ text-align:right; flex:0 0 auto; }
  .exp-title{ font-size:17px; font-weight:800; letter-spacing:-0.25px; word-break:break-word; }
  .exp-sub{ font-size:13px; color:var(--muted); margin-top:3px; }
  .exp-amt{ font-size:19px; font-weight:800; letter-spacing:-0.3px; white-space:nowrap; }
  .exp-cad{ font-size:14px; color:var(--muted); white-space:nowrap; margin-top:2px; }
  .exp-note{ font-size:13px; color:var(--muted); margin-top:10px; line-height:1.45; }
  .ratemark{ color:var(--amber); font-weight:700; margin-left:3px; cursor:help; }
  .chk{ width:22px; height:22px; margin-top:2px; flex:0 0 auto; accent-color:var(--blue); }

  .pill{ display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px;
         border:1px solid; font-family:inherit; cursor:pointer; }

  .tbl{ width:100%; border-collapse:collapse; }
  .tbl th{ font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
           color:var(--muted); padding:13px 16px; text-align:right; }
  .tbl th:first-child{ text-align:left; }
  .tbl td{ padding:15px 16px; font-size:16px; font-weight:700; text-align:right; border-top:1px solid var(--line); }
  .tbl td:first-child{ text-align:left; }
  .tnum{ font-variant-numeric:tabular-nums; }

  .importnote{ font-size:12.5px; line-height:1.5; margin-top:12px; padding:10px 12px; border-radius:10px; }
  .importnote.good{ background:#E7F6EC; color:#1E7B3A; }
  .importnote.bad{ background:var(--red-soft); color:var(--red); }

  .tabbar{ position:fixed; left:0; right:0; bottom:0; display:flex; z-index:40;
    background:rgba(255,255,255,.94); -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px);
    border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom); }
  .tabitem{ flex:1; border:0; background:none; padding:9px 0 7px; font-family:inherit; font-size:11px;
    font-weight:600; color:var(--muted); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; }
  .tabitem.on{ color:var(--blue); }

  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:50;
    display:flex; align-items:center; justify-content:center; padding:18px; }
  .lightboximg{ max-width:100%; max-height:100%; border-radius:12px; }
  .sheet{ background:#fff; border-radius:18px; padding:18px; width:100%; max-width:420px; }
  .sheethead{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }

  .undobar{ position:fixed; left:50%; transform:translateX(-50%); bottom:calc(78px + env(safe-area-inset-bottom));
    width:calc(100% - 32px); max-width:420px; background:#1C1C1E; color:#fff; border-radius:14px; overflow:hidden; z-index:45; }
  .undorow{ display:flex; align-items:center; justify-content:space-between; padding:13px 16px; font-size:14.5px; font-weight:600; }
  .undobtn{ background:#fff; color:#1C1C1E; border:0; border-radius:8px; padding:7px 14px;
    font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; }
  .undotrack{ height:3px; background:#3A3A3C; }
  .undofill{ height:100%; background:#FFB020; transition:width 100ms linear; }

  .toast{ position:fixed; left:50%; transform:translateX(-50%); bottom:calc(78px + env(safe-area-inset-bottom));
    background:#1C1C1E; color:#fff; padding:11px 18px; border-radius:22px; font-size:14px; font-weight:600;
    z-index:46; max-width:calc(100% - 32px); text-align:center; }

</style>
</head>

<script>
  window.__cloudEnabled = false;
  window.__db = null;
  window.addEventListener("error", function(e){
    var root = document.getElementById("root");
    if (root && !window.__appRendered) {
      root.innerHTML = '<div style="font-family:-apple-system,sans-serif;padding:24px;max-width:600px;margin:0 auto;">' +
        '<h2 style="color:#DC3B30;">The app couldn\'t start</h2>' +
        '<p>Please copy this and share it so it can be fixed:</p>' +
        '<pre style="background:#F2F2F7;padding:12px;border-radius:10px;white-space:pre-wrap;font-size:12px;">' +
        (e.message || "Unknown error") + (e.filename ? ("\nin " + e.filename + ":" + e.lineno) : "") +
        '</pre></div>';
    }
  });
  try {
    if (typeof firebaseConfig !== "undefined" && firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY") {
      firebase.initializeApp(firebaseConfig);
      window.__db = firebase.firestore();
      window.__cloudEnabled = true;
    }
  } catch (e) {
    console.error("Firebase init failed, falling back to local storage:", e);
    window.__cloudEnabled = false;
  }
</script>

const PALETTE = ["#0F766E","#B45309","#7C3AED","#BE123C","#0369A1","#15803D","#A21CAF","#C2410C","#1D4ED8","#0F9B8E","#92400E","#5B21B6"];
function colorFor(name){ let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h); return PALETTE[Math.abs(h)%PALETTE.length]; }
const CHIP_COLORS = ["bg-sky-100 text-sky-800","bg-rose-100 text-rose-800","bg-amber-100 text-amber-800","bg-violet-100 text-violet-800","bg-teal-100 text-teal-800"];
function chipColorFor(code){ let h=0; for(let i=0;i<code.length;i++) h=code.charCodeAt(i)+((h<<5)-h); return CHIP_COLORS[Math.abs(h)%CHIP_COLORS.length]; }

function load(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch (e) { return fallback; } }
function save(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch (e) { return false; } }

function emptyForm(defaultName, defaultCategory) {
  return { date: new Date().toISOString().slice(0,10), amount:"", currency:"PHP", vendor:"", category: defaultCategory || "Other", comments:"", submittedBy: defaultName||"", receipt:null };
}
// Pinned to en-CA rather than the device locale, otherwise the same expense renders
// differently per phone (on a US-locale device USD collapses to a bare "$", which is
// ambiguous next to Canadian dollars). en-CA disambiguates the dollar family:
// US$ / A$ / HK$ / NZ$ ... and CAD is routed through fmtCAD for an explicit "C$".
function fmtAmount(n, code) {
  if (code === "CAD") return fmtCAD(n);
  try { return new Intl.NumberFormat("en-CA",{style:"currency",currency:code}).format(n||0); }
  catch(e) { return `${code} ${(n||0).toFixed(2)}`; }
}
// Explicit "C$" rather than Intl's plain "$" for CAD, so it can never be mistaken
// for USD when both appear in the same list.
function fmtCAD(n){ return "C$" + new Intl.NumberFormat("en-CA",{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0); }
function monthLabel(ym){ const [y,m]=ym.split("-"); return new Date(Number(y),Number(m)-1,1).toLocaleDateString("en-CA",{month:"long",year:"numeric"}); }
function normalizeEntry(en){ if(en.currency) return en; return {...en, currency:"PHP", amount: en.amount ?? en.amountPHP}; }
function dedupKey(en){ return `${en.date}|${en.vendor.trim().toLowerCase()}|${en.currency}|${Number(en.amount).toFixed(2)}`; }

function compressImage(file, maxWidth=600, quality=0.5){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxWidth/img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width*scale);
        canvas.height = Math.round(img.height*scale);
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL("image/jpeg",quality));
      };
      img.onerror = ()=>reject(new Error("Could not read image"));
      img.src = e.target.result;
    };
    reader.onerror = ()=>reject(new Error("Could not read file"));
    reader.readAsDataURL(file);
  });
}
async function compressImageSafe(file){
  const attempts = [[600,0.5],[450,0.35],[320,0.25]];
  for(const [w,q] of attempts){
    const dataUrl = await compressImage(file,w,q);
    if(dataUrl.length < 650000) return dataUrl;
  }
  return null;
}

async function fetchRateForCurrencyDate(currency, dateStr){
  if(currency === "CAD") return 1;
  const today = new Date().toISOString().slice(0,10);
  try {
    const url = dateStr === today ? `https://api.frankfurter.app/latest?from=${currency}&to=CAD` : `https://api.frankfurter.app/${dateStr}?from=${currency}&to=CAD`;
    const res = await fetch(url);
    const data = await res.json();
    const r = data.rates && data.rates.CAD;
    if(!r) throw new Error("no rate");
    return r;
  } catch(e){
    try {
      const res2 = await fetch(`https://api.exchangerate-api.com/v4/latest/${currency}`);
      const data2 = await res2.json();
      return (data2.rates && data2.rates.CAD) || null;
    } catch(e2){ return null; }
  }
}

// Tries the exact date first; then a +/-10 day window; then the last known rate
// for that currency (shared across devices when cloud sync is on); only as a true
// last resort, a 1:1 placeholder. Rate is never null, so saving is never blocked.
async function fetchRateWithFallback(currency, dateStr, cache){
  if(currency === "CAD") return { rate:1, usedDate:dateStr, source:"exact" };
  const exact = await fetchRateForCurrencyDate(currency, dateStr);
  if(exact != null) return { rate:exact, usedDate:dateStr, source:"exact" };
  try {
    const target = new Date(dateStr+"T00:00:00");
    const start = new Date(target); start.setDate(start.getDate()-10);
    const end = new Date(target); end.setDate(end.getDate()+10);
    const today = new Date();
    const clampedEnd = end > today ? today : end;
    const fmt = x=>x.toISOString().slice(0,10);
    const url = `https://api.frankfurter.app/${fmt(start)}..${fmt(clampedEnd)}?from=${currency}&to=CAD`;
    const res = await fetch(url);
    const data = await res.json();
    const rates = data.rates;
    if(rates){
      let best=null, bestDiff=Infinity;
      for(const dt of Object.keys(rates)){
        const diff = Math.abs(new Date(dt) - target);
        if(diff < bestDiff){ bestDiff=diff; best=dt; }
      }
      if(best) return { rate: rates[best].CAD, usedDate: best, source:"nearby" };
    }
  } catch(e){}
  if(cache && cache[currency]) return { rate: cache[currency].rate, usedDate: cache[currency].date, source:"cached" };
  return { rate:1, usedDate:null, source:"unknown" };
}

function currencySymbol(code){
  if(code === "CAD") return "C$";
  try {
    const parts = new Intl.NumberFormat("en-CA",{style:"currency",currency:code}).formatToParts(1);
    const s = parts.find(p=>p.type==="currency");
    return s ? s.value : code;
  } catch(e){ return code; }
}

function RateMark({en}){
  if(!en.rateSource || en.rateSource==="exact") return null;
  const title = en.rateSource==="nearby" ? `Rate from ${en.rateDate} (closest available to ${en.date})`
    : en.rateSource==="cached" ? `Exchange service was unavailable — used last known rate from ${en.rateDate}`
    : "Exchange rate was unavailable — placeholder rate used, edit to fix";
  return <span title={title} className="ratemark">≈</span>;
}

function ExpenseTracker(){
  const [entries, setEntries] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [vendors, setVendors] = useState([]);
  const [rateCache, setRateCache] = useState({});
  const [syncError, setSyncError] = useState(false);
  const [isOffline, setIsOffline] = useState(() => cloudConfigured ? load(LS.offlineMode, false) : true);
  const useCloud = cloudConfigured && !isOffline;
  const [merging, setMerging] = useState(false);

  const [previewRate, setPreviewRate] = useState(null);
  const [previewRateInfo, setPreviewRateInfo] = useState(null);
  const [previewLoading, setPreviewLoading] = useState(false);
  const debounceRef = useRef(null);

  const [userName, setUserName] = useState("");
  const [defaultSubmittedBy, setDefaultSubmittedBy] = useState("");
  const [submittedByTouched, setSubmittedByTouched] = useState(false);
  const [form, setForm] = useState(emptyForm());
  const [editingId, setEditingId] = useState(null);
  const [formError, setFormError] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [imgError, setImgError] = useState("");

  const [showNewVendor, setShowNewVendor] = useState(false);
  const [newVendorText, setNewVendorText] = useState("");
  const [showCatManager, setShowCatManager] = useState(false);
  const [showVendorManager, setShowVendorManager] = useState(false);
  const [catEdits, setCatEdits] = useState({});
  const [vendorEdits, setVendorEdits] = useState({});
  const [newCatText, setNewCatText] = useState("");

  const [search, setSearch] = useState("");
  const [categoryFilter, setCategoryFilter] = useState("All");
  const [statusFilter, setStatusFilter] = useState("All");
  const [sortKey, setSortKey] = useState("date");
  const [sortDir, setSortDir] = useState("desc");
  const [lightbox, setLightbox] = useState(null);
  const [expandedMonths, setExpandedMonths] = useState({});

  const [selected, setSelected] = useState({});
  const [pendingDelete, setPendingDelete] = useState(null);
  const pendingTimerRef = useRef(null);
  const [undoTick, setUndoTick] = useState(0);
  const entriesRef = useRef(entries);
  useEffect(()=>{ entriesRef.current = entries; },[entries]);

  const [importing, setImporting] = useState(false);
  const [importSummary, setImportSummary] = useState(null);
  const fileInputRef = useRef(null);
  const [showExportMenu, setShowExportMenu] = useState(false);

  const [toast, setToast] = useState("");
  const showToast = useCallback((msg)=>{ setToast(msg); setTimeout(()=>setToast(""),2600); },[]);

  // Merges anything saved locally while offline into Firestore, skipping exact
  // duplicates (same date+vendor+currency+amount as something already in the
  // cloud), then clears the local copy of whatever was successfully merged.
  const mergeOfflineToCloud = useCallback(async () => {
    if (!cloudConfigured) return;
    const localEntries = load(LS.expenses, []).map(normalizeEntry);
    const localCats = load(LS.categories, null);
    const localVens = load(LS.vendors, null);
    if (localEntries.length === 0 && !localCats && !localVens) return;
    setMerging(true);
    try {
      if (localEntries.length > 0) {
        const snap = await db.collection("expenses").get();
        const existingKeys = new Set(snap.docs.map((d) => dedupKey(normalizeEntry(d.data()))));
        const toMerge = localEntries.filter((en) => !existingKeys.has(dedupKey(en)));
        if (toMerge.length > 0) {
          const batch = db.batch();
          toMerge.forEach((en) => batch.set(db.collection("expenses").doc(en.id), en));
          await batch.commit();
        }
        const skipped = localEntries.length - toMerge.length;
        localStorage.removeItem(LS.expenses);
        showToast(`Synced ${toMerge.length} offline ${toMerge.length === 1 ? "entry" : "entries"} to the cloud${skipped > 0 ? ` · skipped ${skipped} duplicate${skipped === 1 ? "" : "s"}` : ""}`);
      }
      if (localCats && localCats.length) {
        const doc = await db.collection("meta").doc("categories").get();
        const cloudCats = doc.exists ? doc.data().list : DEFAULT_CATEGORIES;
        const merged = Array.from(new Set([...cloudCats, ...localCats]));
        await db.collection("meta").doc("categories").set({ list: merged });
        localStorage.removeItem(LS.categories);
      }
      if (localVens && localVens.length) {
        const doc = await db.collection("meta").doc("vendors").get();
        const cloudVens = doc.exists ? doc.data().list : [];
        const merged = Array.from(new Set([...cloudVens, ...localVens]));
        await db.collection("meta").doc("vendors").set({ list: merged });
        localStorage.removeItem(LS.vendors);
      }
    } catch (e) {
      console.error("Merge failed:", e);
      showToast("Couldn't sync your offline entries to the cloud yet — they're safe locally, will retry next time you're online");
    } finally {
      setMerging(false);
    }
  }, []);

  function toggleOffline() {
    const next = !isOffline;
    setIsOffline(next);
    save(LS.offlineMode, next);
  }

  useEffect(()=>{
    if(useCloud){
      mergeOfflineToCloud();
      const unsubE = db.collection("expenses").onSnapshot(
        snap=>{ setEntries(snap.docs.map(d=>normalizeEntry(d.data()))); setLoaded(true); },
        err=>{ console.error(err); setSyncError(true); setLoaded(true); }
      );
      const unsubC = db.collection("meta").doc("categories").onSnapshot(doc=>{
        if(doc.exists) setCategories(doc.data().list);
        else db.collection("meta").doc("categories").set({list:DEFAULT_CATEGORIES});
      });
      const unsubV = db.collection("meta").doc("vendors").onSnapshot(doc=>{
        if(doc.exists) setVendors(doc.data().list);
        else db.collection("meta").doc("vendors").set({list:[]});
      });
      const unsubR = db.collection("meta").doc("rateCache").onSnapshot(doc=>{
        if(doc.exists) setRateCache(doc.data().map || {});
      });
      return ()=>{ unsubE(); unsubC(); unsubV(); unsubR(); };
    } else {
      setEntries(load(LS.expenses,[]).map(normalizeEntry));
      setCategories(load(LS.categories,DEFAULT_CATEGORIES));
      setVendors(load(LS.vendors,[]));
      setRateCache(load(LS.rateCache,{}));
      setLoaded(true);
    }
  },[useCloud]);

  // personal preferences: always local to this device, never synced to the cloud
  useEffect(()=>{
    const savedName = load(LS.userName, "");
    const savedSubmittedBy = load(LS.submittedBy, "");
    if(savedName) setUserName(savedName);
    const initial = savedSubmittedBy || savedName;
    if(initial){
      setForm(f=>({...f, submittedBy:initial}));
      setDefaultSubmittedBy(initial);
    }
  },[]);

  useEffect(()=>{
    if(!form.date || !form.currency) return;
    setPreviewLoading(true);
    if(debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(async ()=>{
      const {rate, usedDate, source} = await fetchRateWithFallback(form.currency, form.date, rateCache);
      setPreviewRate(rate);
      setPreviewRateInfo(source !== "exact" ? {usedDate, source} : null);
      setPreviewLoading(false);
    },350);
    return ()=>clearTimeout(debounceRef.current);
  },[form.date, form.currency, rateCache]);

  useEffect(()=>{
    if(!pendingDelete) return;
    const id = setInterval(()=>setUndoTick(t=>t+1), 100);
    return ()=>clearInterval(id);
  },[pendingDelete]);

  const batchWriteEntries = useCallback(async (list)=>{
    if(list.length===0) return;
    if(useCloud){
      try {
        const batch = db.batch();
        list.forEach(en=> batch.set(db.collection("expenses").doc(en.id), en));
        await batch.commit();
      } catch(e){ showToast("Couldn't save to the cloud — try again"); }
    } else {
      setEntries(prev=>{
        const map = new Map(prev.map(e=>[e.id,e]));
        list.forEach(en=>map.set(en.id,en));
        const next = Array.from(map.values());
        save(LS.expenses,next);
        return next;
      });
    }
  },[useCloud]);
  const writeEntry = useCallback((entry)=> batchWriteEntries([entry]), [batchWriteEntries]);
  const writeCategories = useCallback(async (next)=>{
    setCategories(next);
    if(useCloud){ try { await db.collection("meta").doc("categories").set({list:next}); } catch(e){} }
    else save(LS.categories,next);
  },[useCloud]);
  const writeVendors = useCallback(async (next)=>{
    setVendors(next);
    if(useCloud){ try { await db.collection("meta").doc("vendors").set({list:next}); } catch(e){} }
    else save(LS.vendors,next);
  },[useCloud]);
  const updateRateCache = useCallback((currency, rate, date)=>{
    setRateCache(prev=>{
      const next = { ...prev, [currency]: { rate, date } };
      if(useCloud){ db.collection("meta").doc("rateCache").set({map: next}).catch(()=>{}); }
      else save(LS.rateCache, next);
      return next;
    });
  },[useCloud]);
  function handleUserNameChange(v){
    setUserName(v);
    save(LS.userName, v);
    if(!submittedByTouched){
      setForm(f=>({...f, submittedBy:v}));
      setDefaultSubmittedBy(v);
    }
  }
  function handleSubmittedByChange(v){
    setSubmittedByTouched(true);
    setForm(f=>({...f, submittedBy:v}));
  }

  function addCategory(){
    const name = newCatText.trim();
    if(!name || categories.includes(name)) return;
    writeCategories([...categories,name]); setNewCatText("");
  }
  async function renameCategory(oldName,newName){
    const trimmed = newName.trim();
    if(!trimmed || trimmed===oldName) return;
    await writeCategories(categories.map(c=>c===oldName?trimmed:c));
    const affected = entries.filter(en=>en.category===oldName).map(en=>({...en,category:trimmed}));
    if(affected.length) await batchWriteEntries(affected);
    showToast(`Renamed category to "${trimmed}"`);
  }
  async function deleteCategory(name){
    if(categories.length<=1) return showToast("Keep at least one category");
    const fallback = categories.find(c=>c!==name) || "Other";
    await writeCategories(categories.filter(c=>c!==name));
    const affected = entries.filter(en=>en.category===name).map(en=>({...en,category:fallback}));
    if(affected.length) await batchWriteEntries(affected);
    if(form.category===name) setForm(f=>({...f,category:fallback}));
    showToast(`Deleted "${name}" — entries moved to "${fallback}"`);
  }

  async function addVendorToList(name){
    const trimmed = (name||"").trim();
    if(!trimmed || vendors.includes(trimmed)) return;
    await writeVendors([...vendors,trimmed]);
  }
  async function renameVendor(oldName,newName){
    const trimmed = newName.trim();
    if(!trimmed || trimmed===oldName) return;
    await writeVendors(vendors.map(v=>v===oldName?trimmed:v));
    const affected = entries.filter(en=>en.vendor===oldName).map(en=>({...en,vendor:trimmed}));
    if(affected.length) await batchWriteEntries(affected);
    showToast(`Renamed vendor to "${trimmed}"`);
  }
  async function deleteVendor(name){ await writeVendors(vendors.filter(v=>v!==name)); showToast(`Removed "${name}" from vendor list`); }
  function handleVendorSelect(e){
    const v = e.target.value;
    if(v==="__new__"){ setShowNewVendor(true); setForm(f=>({...f,vendor:""})); }
    else { setShowNewVendor(false); setForm(f=>({...f,vendor:v})); }
  }
  async function confirmNewVendor(){
    const name = newVendorText.trim();
    if(!name) return;
    await addVendorToList(name);
    setForm(f=>({...f,vendor:name}));
    setNewVendorText(""); setShowNewVendor(false);
  }

  function startEdit(entry){
    setEditingId(entry.id);
    setForm({ date:entry.date, amount:String(entry.amount), currency:entry.currency||"PHP", vendor:entry.vendor, category:entry.category, comments:entry.comments||"", submittedBy:entry.submittedBy||"", receipt:entry.receipt||null });
    setShowNewVendor(false); setSubmittedByTouched(true); setFormError("");
    window.scrollTo({top:0,behavior:"smooth"});
  }
  function cancelEdit(){ setEditingId(null); setForm(emptyForm(defaultSubmittedBy,categories[0])); setSubmittedByTouched(false); setFormError(""); }

  async function handleReceiptChange(e){
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    setImgError("");
    try {
      const dataUrl = await compressImageSafe(file);
      if(!dataUrl){ setImgError("That photo is too large even after compression — try a clearer, closer shot."); return; }
      setForm(f=>({...f,receipt:dataUrl}));
    } catch(err){ setImgError("Couldn't process that image — try a different photo."); }
  }

  async function handleSubmit(e){
    e.preventDefault();
    const amt = parseFloat(form.amount);
    if(!form.date){ setFormError("Pick a date."); return false; }
    if(!form.vendor.trim()){ setFormError("Enter a vendor."); return false; }
    if(!amt || amt<=0){ setFormError("Enter an amount greater than zero."); return false; }

    setSubmitting(true); setFormError("");
    const {rate: dateRate, usedDate, source} = await fetchRateWithFallback(form.currency, form.date, rateCache);
    if(source==="exact" || source==="nearby") updateRateCache(form.currency, dateRate, usedDate);
    const amountCAD = amt*dateRate;
    const vendorName = form.vendor.trim();
    if(!vendors.includes(vendorName)) addVendorToList(vendorName);

    const successMsg = (verb)=>{
      if(source==="exact") return `Expense ${verb}`;
      if(source==="nearby") return `${verb==="added"?"Added":"Updated"} — used the closest available rate (${usedDate})`;
      if(source==="cached") return `${verb==="added"?"Added":"Updated"} — exchange service unavailable, used last known rate from ${usedDate}`;
      return `${verb==="added"?"Added":"Updated"} — no rate available yet, saved with a 1:1 placeholder; edit later to fix`;
    };

    if(editingId){
      const updated = entries.find(en=>en.id===editingId);
      const next = { ...updated, date:form.date, amount:amt, currency:form.currency, vendor:vendorName, category:form.category, comments:form.comments.trim(), submittedBy:form.submittedBy.trim(), receipt:form.receipt, amountCAD, rate:dateRate, rateDate:usedDate, rateSource:source };
      await writeEntry(next);

    } else {
      const newEntry = { id:`${Date.now()}-${Math.random().toString(36).slice(2,8)}`, date:form.date, amount:amt, currency:form.currency, vendor:vendorName, category:form.category, comments:form.comments.trim(), submittedBy:form.submittedBy.trim(), receipt:form.receipt, amountCAD, rate:dateRate, rateDate:usedDate, rateSource:source, status:"Pending", approvedBy:null, approvedAt:null, createdAt:Date.now() };
      await writeEntry(newEntry);
      showToast(successMsg("added"));
    }
    const justUsedSubmittedBy = form.submittedBy.trim();
    if(justUsedSubmittedBy){ setDefaultSubmittedBy(justUsedSubmittedBy); save(LS.submittedBy, justUsedSubmittedBy); }

  function selectAllVisible(ids, checked){ setSelected(s=>{ const n={...s}; ids.forEach(id=>{ if(checked) n[id]=true; else delete n[id]; }); return n; }); }

  // ---- soft delete with undo ----
  function softDelete(ids){
    const toDelete = entries.filter(en=>ids.includes(en.id));
    if(toDelete.length===0) return;
    if(pendingDelete) commitPendingDelete(pendingDelete);

    setEntries(prev=>prev.filter(en=>!ids.includes(en.id)));
    setSelected(s=>{ const n={...s}; ids.forEach(id=>delete n[id]); return n; });

    const expiresAt = Date.now() + UNDO_WINDOW_MS;
    const record = { ids, entries: toDelete, expiresAt };
    if(pendingTimerRef.current) clearTimeout(pendingTimerRef.current);
    pendingTimerRef.current = setTimeout(()=>commitPendingDelete(record), UNDO_WINDOW_MS);
    setPendingDelete(record);
  }
  async function commitPendingDelete(record){
    if(!record) return;
    setPendingDelete(cur=> (cur && cur.expiresAt===record.expiresAt) ? null : cur);
    if(useCloud){
      try {
        const batch = db.batch();
        record.ids.forEach(id=> batch.delete(db.collection("expenses").doc(id)));
        await batch.commit();
      } catch(e){ showToast("Couldn't delete from the cloud — try again"); }
    } else {
      setEntries(prev=>{
        const next = prev.filter(en=>!record.ids.includes(en.id));
        save(LS.expenses,next);
        return next;
      });
    }
  }
  function undoDelete(){
    if(!pendingDelete) return;
    if(pendingTimerRef.current) clearTimeout(pendingTimerRef.current);
    setEntries(prev=>{
      const map = new Map(prev.map(e=>[e.id,e]));
      pendingDelete.entries.forEach(e=>map.set(e.id,e));
      return Array.from(map.values());
    });
    setPendingDelete(null);
    showToast("Restored");
  }
  function deleteEntry(id){ softDelete([id]); }
  function deleteSelected(){ softDelete(Object.keys(selected)); }

  // ---- CSV / Excel import ----
  function pickField(row, candidates){
    const keys = Object.keys(row);
    for(const c of candidates){
      const found = keys.find(k=>k.trim().toLowerCase()===c);
      if(found && String(row[found]).trim()!=="") return row[found];
    }
    return undefined;
  }
  function parseDateValue(v){
    if(v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
    if(typeof v==="string" && /^\d{4}-\d{2}-\d{2}$/.test(v.trim())) return v.trim();
    const d = new Date(v);
    if(!isNaN(d)) return d.toISOString().slice(0,10);
    return null;
  }

  async function handleImportFile(e){
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    setImporting(true); setImportSummary(null);
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:"array", cellDates:true});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:""});

      const existingKeys = new Set(entries.map(dedupKey));
      const seenThisImport = new Set();
      const rateCache2 = new Map();
      const toAdd = [];
      let skippedDup=0, errored=0;
      const newCats = new Set(categories);
      const newVendors = new Set(vendors);

      for(const row of rows){
        const rawDate = pickField(row,["date"]);
        const rawVendor = pickField(row,["vendor","payee","merchant"]);
        const rawAmount = pickField(row,["amount (original)","amount (php)","original amount","amount"]);
        const rawCurrency = pickField(row,["currency","currency code"]) || "PHP";
        const rawCategory = pickField(row,["category"]) || "Other";
        const rawSubmittedBy = pickField(row,["submitted by","submittedby","by"]) || "";
        const rawComments = pickField(row,["comments","notes","comment"]) || "";
        const rawStatus = pickField(row,["status"]) || "Pending";

        const date = parseDateValue(rawDate);
        const amount = parseFloat(rawAmount);
        const currency = String(rawCurrency).trim().toUpperCase();
        const vendor = String(rawVendor||"").trim();
        const status = STATUSES.includes(rawStatus) ? rawStatus : "Pending";

        if(!date || !vendor || !amount || amount<=0){ errored++; continue; }

        const key = `${date}|${vendor.toLowerCase()}|${currency}|${amount.toFixed(2)}`;
        if(existingKeys.has(key) || seenThisImport.has(key)){ skippedDup++; continue; }
        seenThisImport.add(key);

        const cacheKey = `${currency}|${date}`;
        let rateInfo = rateCache2.get(cacheKey);
        if(rateInfo===undefined){
          rateInfo = await fetchRateWithFallback(currency,date,rateCache);
          rateCache2.set(cacheKey,rateInfo);
          if(rateInfo.source==="exact" || rateInfo.source==="nearby") updateRateCache(currency, rateInfo.rate, rateInfo.usedDate);
        }

        toAdd.push({
          id:`${Date.now()}-${Math.random().toString(36).slice(2,8)}`,
          date, amount, currency, vendor, category:String(rawCategory).trim()||"Other",
          comments:String(rawComments).trim(), submittedBy:String(rawSubmittedBy).trim(),
          receipt:null, amountCAD:amount*rateInfo.rate, rate:rateInfo.rate, rateDate:rateInfo.usedDate,
          rateSource:rateInfo.source, status, approvedBy:null, approvedAt:null, createdAt:Date.now(),
        });
        newCats.add(String(rawCategory).trim()||"Other");
        if(vendor) newVendors.add(vendor);
      }

      if(toAdd.length>0) await batchWriteEntries(toAdd);
      if(newCats.size>categories.length) await writeCategories(Array.from(newCats));
      if(newVendors.size>vendors.length) await writeVendors(Array.from(newVendors));

      setImportSummary({added:toAdd.length, skipped:skippedDup, errored, total:rows.length});
      showToast(`Imported ${toAdd.length} new ${toAdd.length===1?"entry":"entries"}`);
    } catch(err){
      setImportSummary({added:0,skipped:0,errored:0,total:0,fileError:true});
      showToast("Couldn't read that file — check it's a valid CSV or Excel file");
    } finally {
      setImporting(false);
      if(fileInputRef.current) fileInputRef.current.value = "";
    }
  }

  const filtered = useMemo(()=>{
    let list = entries.filter(en=>{
      const matchesCat = categoryFilter==="All" || en.category===categoryFilter;
      const matchesStatus = statusFilter==="All" || en.status===statusFilter;
      const q = search.trim().toLowerCase();
      const matchesSearch = !q || en.vendor.toLowerCase().includes(q) || en.category.toLowerCase().includes(q) || (en.comments||"").toLowerCase().includes(q) || (en.submittedBy||"").toLowerCase().includes(q);
      return matchesCat && matchesStatus && matchesSearch;
    });
    list = list.slice().sort((a,b)=>{
      let av=a[sortKey], bv=b[sortKey];
      if(sortKey==="date"){ av=new Date(a.date).getTime(); bv=new Date(b.date).getTime(); }
      else if(sortKey==="amountCAD"||sortKey==="amount"){ av=Number(av); bv=Number(bv); }
      else { av=String(av||"").toLowerCase(); bv=String(bv||"").toLowerCase(); }
      if(av<bv) return sortDir==="asc"?-1:1;
      if(av>bv) return sortDir==="asc"?1:-1;
      return 0;
    });
    return list;
  },[entries,search,categoryFilter,statusFilter,sortKey,sortDir]);

  async function offerDownload(blob, filename){
    try {
      const file = new File([blob], filename, { type: blob.type });
      if(navigator.canShare && navigator.canShare({ files: [file] })){
        await navigator.share({ files: [file], title: filename });
        return;
      }
    } catch(err){
      // share cancelled or unsupported — fall back to a normal download below
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  }

      window.location.href = `mailto:?subject=${subject}&body=${body}`;

  function exportExcel(){
    try {
      const data = filtered.map(e=>({Date:e.date,Vendor:e.vendor||"",Category:e.category||"","Submitted By":e.submittedBy||"",Status:e.status||"Pending","Amount (Original)":Number(e.amount||0),Currency:e.currency||"PHP","Rate (to CAD)":Number((e.rate||0).toFixed(6)),"Amount (CAD)":Number((e.amountCAD||0).toFixed(2)),Comments:e.comments||""}));
      const ws = XLSX.utils.json_to_sheet(data);

      const wb = XLSX.utils.book_new();

      const monthlyData = monthlyGroups.map(([ym,g])=>({Month:monthLabel(ym),"Total (CAD)":Number(g.total.toFixed(2)),"# Entries":g.count}));
      monthlyData.push({Month:"Grand Total","Total (CAD)":Number(totalCAD.toFixed(2)),"# Entries":filtered.length});

  // Rolls the filtered entries up by period. The "Original" column only shows a
  // figure when every entry in that period shares one currency — summing across
  // different currencies would be meaningless, so those read "mixed".
  function buildPeriodRows(keyFn, labelFn){
    const map = {};
    filtered.forEach(e=>{
      const k = keyFn(e);
      if(!map[k]) map[k] = { count:0, cad:0, byCur:{} };
      map[k].count += 1;
      map[k].cad += e.amountCAD;
      map[k].byCur[e.currency] = (map[k].byCur[e.currency]||0) + Number(e.amount||0);
    });
    return Object.entries(map).sort((a,b)=> a[0]<b[0] ? 1 : -1).map(([k,v])=>{
      const curs = Object.keys(v.byCur);
      return {
        key: k,
        label: labelFn(k),
        count: v.count,
        cad: v.cad,
        original: curs.length===1 ? fmtAmount(v.byCur[curs[0]], curs[0]) : "mixed",
      };
    });
  }

                    onChange={e=>setNewVendorText(e.target.value)}
                    onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); confirmNewVendor(); } }} />
                  <button type="button" className="btn btn-soft" style={{width:"auto",padding:"0 16px"}} onClick={confirmNewVendor}>Add</button>
                  <button type="button" className="btn btn-plain" style={{width:"auto",padding:"0 14px"}} onClick={()=>{ setShowNewVendor(false); setNewVendorText(""); }}>✕</button>
                </div>
              )}
              {showVendorManager && (
                <div className="manager">
                  {vendors.length===0 && <div className="hint">No vendors yet — add one above.</div>}
                  {vendors.map(v=>(
                    <div key={v} className="managerrow">
                      <input className="fld" value={vendorEdits[v] ?? v} onChange={e=>setVendorEdits({...vendorEdits, [v]:e.target.value})} />
                      <button type="button" className="linkbtn" onClick={()=>{ renameVendor(v, vendorEdits[v] ?? v); setVendorEdits(s=>{const c={...s}; delete c[v]; return c;}); }}>Save</button>
                      <button type="button" className="linkbtn danger" onClick={()=>deleteVendor(v)}>Delete</button>
                    </div>
                  ))}
                </div>
              )}

              <div className="lblrow" style={{marginTop:14}}>
                <label className="lbl" style={{marginBottom:0}}>Category</label>
                <button type="button" className="linkbtn" onClick={()=>setShowCatManager(s=>!s)}>Manage</button>
              </div>
              <select className="fld" value={form.category} onChange={e=>setForm({...form, category:e.target.value})}>
                {categories.map(c=> <option key={c} value={c}>{c}</option>)}
              </select>
              {showCatManager && (
                <div className="manager">
                  {categories.map(c=>(
                    <div key={c} className="managerrow">
                      <span className="dot" style={{background: colorFor(c)}} />
                      <input className="fld" value={catEdits[c] ?? c} onChange={e=>setCatEdits({...catEdits, [c]:e.target.value})} />
                      <button type="button" className="linkbtn" onClick={()=>{ renameCategory(c, catEdits[c] ?? c); setCatEdits(s=>{const n={...s}; delete n[c]; return n;}); }}>Save</button>
                      <button type="button" className="linkbtn danger" onClick={()=>deleteCategory(c)}>Delete</button>
                    </div>
                  ))}
                  <div className="managerrow">
                    <input className="fld" placeholder="New category" value={newCatText}
                      onChange={e=>setNewCatText(e.target.value)}
                      onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); addCategory(); } }} />
                    <button type="button" className="linkbtn" onClick={addCategory}>Add</button>
                  </div>
                </div>
              )}

              <label className="lbl" style={{marginTop:14}}>Submitted by</label>
              <input type="text" className="fld" placeholder="Name" value={form.submittedBy}
                onChange={e=>handleSubmittedByChange(e.target.value)} />

              <label className="lbl" style={{marginTop:14}}>Comments</label>
              <textarea rows={2} className="fld" placeholder="Optional notes" value={form.comments}
                onChange={e=>setForm({...form, comments:e.target.value})} />
            </div>

            {formError && <div className="card err" style={{marginBottom:12}}>{formError}</div>}

            <button type="submit" className="btn btn-primary" disabled={submitting}>
              {submitting ? "Converting…" : editingId ? "Save changes" : "Add expense"}
            </button>
          </form>
        </div>
      )}

      {/* ----------------------------- HISTORY ----------------------------- */}
      {tab === "history" && (
        <div className="wrap">
          <PageHead title="History" currency={displayCurrency} rate={liveRate} rateDate={liveRateDate} offline={cloudConfigured && isOffline} />

          <div className="filters">
            <input type="search" className="fld" placeholder="Search vendor, category, notes…"
              value={search} onChange={e=>setSearch(e.target.value)} />
            <button className="btn btn-soft" style={{width:"auto", padding:"0 16px"}}
              onClick={()=>{ setSelectMode(s=>!s); clearSelection(); }}>{selectMode ? "Done" : "Select"}</button>
          </div>
          <div className="filters">
            <select className="fld" value={categoryFilter} onChange={e=>setCategoryFilter(e.target.value)}>
              <option value="All">All categories</option>
              {categories.map(c=> <option key={c} value={c}>{c}</option>)}
            </select>
            <select className="fld" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
              <option value="All">All statuses</option>
              {STATUSES.map(s=> <option key={s} value={s}>{s}</option>)}
            </select>
          </div>

          {filtered.length>0 && (
            <div className="tally">{filtered.length} {filtered.length===1?"entry":"entries"} · {fmtCAD(totalCAD)}</div>
          )}

          {selectMode && selectedCount>0 && (
            <div className="card selbar">
              <span>{selectedCount} selected</span>
              <div style={{display:"flex", gap:8}}>
                <button className="btn btn-soft" style={{width:"auto", padding:"8px 14px"}}
                  onClick={()=>selectAllVisible(filtered.map(f=>f.id), !allVisibleSelected)}>
                  {allVisibleSelected ? "None" : "All"}
                </button>
                <button className="btn btn-danger" style={{width:"auto", padding:"8px 14px"}} onClick={deleteSelected}>Delete</button>
              </div>
            </div>
          )}

          {!loaded ? <div className="card empty">Loading…</div>
            : filtered.length===0 ? (
              <div className="card empty">
                {entries.length===0 ? "No expenses yet. Add your first one from the New tab." : "Nothing matches your search or filters."}
              </div>
            ) : filtered.map(en=>(
              <ExpenseCard key={en.id} en={en}
                selectMode={selectMode} selected={!!selected[en.id]} onToggle={()=>toggleSelect(en.id)}
                onEdit={editFromHistory} onShare={shareEntry} onDelete={deleteEntry}
                onPhoto={setLightbox} onStatus={cycleStatus} />
            ))}
        </div>
      )}

      {/* ----------------------------- SUMMARY ----------------------------- */}
      {tab === "summary" && (
        <div className="wrap">
          <PageHead title="Summary" currency={displayCurrency} rate={liveRate} rateDate={liveRateDate} offline={cloudConfigured && isOffline} />

          <SectionLabel>By month</SectionLabel>
          <SummaryTable rows={monthRows} />

          <SectionLabel>By year</SectionLabel>
          <SummaryTable rows={yearRows} />

          <SectionLabel>By category</SectionLabel>
          {byCategory.length===0 ? <div className="card empty">Nothing yet.</div> : (
            <div className="card tblcard">
              <table className="tbl">
                <thead><tr><th>Category</th><th>CAD</th></tr></thead>
                <tbody>
                  {byCategory.map(([c,amt])=>(
                    <tr key={c}>
                      <td><span className="dot" style={{background: colorFor(c)}} />{c}</td>
                      <td className="tnum">{fmtCAD(amt)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          <SectionLabel>By vendor</SectionLabel>
          {overallByVendor.length===0 ? <div className="card empty">Nothing yet.</div> : (
            <div className="card tblcard">
              <table className="tbl">
                <thead><tr><th>Vendor</th><th>CAD</th></tr></thead>
                <tbody>
                  {overallByVendor.map(([v,amt])=>(
                    <tr key={v}><td>{v}</td><td className="tnum">{fmtCAD(amt)}</td></tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          <SectionLabel>Cloud sync</SectionLabel>
          <div className="card">
            <div className="lblrow" style={{marginBottom:8}}>
              <div className="cardtitle" style={{marginBottom:0}}>{merging ? "Syncing…" : useCloud ? "Online" : cloudConfigured ? "Offline mode" : "This device only"}</div>
              <span className="pill" style={
                merging ? {background:"#FFF3E0", color:"#96620A", borderColor:"#F0DCB4"}
                : useCloud ? {background:"#E7F6EC", color:"#1E7B3A", borderColor:"#BFE5CB"}
                : {background:"#EFEFF4", color:"#6B6B70", borderColor:"#DFDFE4"}
              }>{merging ? "syncing" : useCloud ? "syncing on" : cloudConfigured ? "paused" : "local only"}</span>
            </div>
            <div className="cardbody">
              {merging ? "Uploading the entries you added offline…"
                : useCloud ? "Entries sync automatically across every device using this app." + (syncError ? " (Trouble reaching the cloud right now — check your connection or Firestore rules.)" : "")
                : cloudConfigured ? "Entries are saving to this device only. Switch back online and everything added here uploads automatically, with duplicates skipped — nothing is lost either way."
                : "Data is stored only in this browser, so there's nothing to sync and no offline switch. Part 3 of the deployment guide (optional) turns on shared cloud sync across devices."}
            </div>
            {cloudConfigured && (
              <button className={isOffline ? "btn btn-primary" : "btn btn-soft"} style={{borderRadius:10, padding:13}}
                onClick={toggleOffline} disabled={merging}>
                {isOffline ? "Go back online & sync" : "Work offline"}
              </button>
            )}
          </div>

          <SectionLabel>Export &amp; import</SectionLabel>
          <div className="card">
            <div className="cardtitle">Take your data with you</div>
            <div className="cardbody">Save your expenses as an Excel or CSV file, or send them straight to Mail, Messages, WhatsApp and anything else on your device.</div>
            <div className="btnrow2">
              <button className="btn btn-soft" onClick={()=>fileInputRef.current && fileInputRef.current.click()} disabled={importing}>
                {importing ? "Importing…" : "Import file"}
              </button>
              <button className="btn btn-primary" style={{borderRadius:10, padding:12}} disabled={filtered.length===0}
                onClick={()=>setShowExportMenu(true)}>Export</button>
            </div>
            <input ref={fileInputRef} type="file" accept=".csv,.xlsx,.xls" onChange={handleImportFile} style={{display:"none"}} />
            {importSummary && (
              <div className={"importnote "+(importSummary.fileError ? "bad" : "good")}>
                {importSummary.fileError
                  ? "Couldn't read that file — make sure it's a CSV or Excel file with Date, Vendor and Amount columns."
                  : `${importSummary.added} added · ${importSummary.skipped} duplicates skipped · ${importSummary.errored} rows had missing or invalid data (out of ${importSummary.total}).`}
                <button className="linkbtn" onClick={()=>setImportSummary(null)}>Dismiss</button>
              </div>
            )}
          </div>
        </div>
      )}

      <TabBar tab={tab} setTab={setTab} />

      {/* ------------------------------ overlays ------------------------------ */}
      {lightbox && (
        <div className="overlay" onClick={()=>setLightbox(null)}>
          <img src={lightbox} alt="Receipt" className="lightboximg" />
        </div>
      )}

      {showExportMenu && (
        <div className="overlay" onClick={()=>setShowExportMenu(false)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheethead">
              <div>
                <div className="cardtitle" style={{fontSize:19}}>Export</div>
                <div className="cardbody" style={{marginBottom:0}}>{filtered.length} {filtered.length===1?"entry":"entries"} · {fmtCAD(totalCAD)}</div>
              </div>
              <button className="linkbtn" onClick={()=>setShowExportMenu(false)}>Close</button>
            </div>
            <div className="btnrow2" style={{marginTop:14}}>
              <button className="btn btn-soft" style={{padding:"18px 10px"}} onClick={exportExcel}>Excel (.xlsx)</button>
              <button className="btn btn-soft" style={{padding:"18px 10px"}} onClick={exportCSV}>CSV (.csv)</button>
            </div>
            <button className="btn btn-primary" style={{marginTop:8}} onClick={shareViaMessaging}>
              Send via Mail, Messages, WhatsApp…
            </button>
            <div className="hint" style={{textAlign:"center", marginTop:8}}>Opens your device's share sheet so you can pick where it goes.</div>
          </div>
        </div>
      )}

      {pendingDelete && (
        <div className="undobar">
          <div className="undorow">
            <span>{pendingDelete.ids.length} deleted</span>
            <button className="undobtn" onClick={undoDelete}>Undo {undoSecs}s</button>
          </div>
          <div className="undotrack"><div className="undofill" style={{width: undoPct+"%"}} /></div>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<ExpenseTracker />);
  window.__appRendered = true;
} catch (err) {
  document.getElementById("root").innerHTML =
    '<div style="font-family:-apple-system,sans-serif;padding:24px;max-width:600px;margin:0 auto;">' +
    '<h2 style="color:#DC3B30;">Something went wrong loading the app</h2>' +
    '<p>Please copy the text below and share it so this can be fixed:</p>' +
    '<pre style="background:#F2F2F7;padding:12px;border-radius:10px;white-space:pre-wrap;font-size:12px;">' +
    (err && err.stack ? err.stack : String(err)) + '</pre></div>';
  console.error(err);
}
</script>

<script>
  // If Babel or React fail to load (flaky mobile connection), say so instead of
  // leaving a blank screen.
  window.addEventListener("load", function () {
    setTimeout(function () {
      if (!window.__appRendered) {
        var missing = [];
        if (typeof Babel === "undefined") missing.push("Babel");
        if (typeof React === "undefined") missing.push("React");
        if (typeof ReactDOM === "undefined") missing.push("ReactDOM");
        if (typeof XLSX === "undefined") missing.push("XLSX (export library)");
        var root = document.getElementById("root");
        if (root && missing.length > 0) {
          root.innerHTML =
            '<div style="font-family:-apple-system,sans-serif;padding:24px;max-width:600px;margin:0 auto;">' +
            '<h2 style="color:#DC3B30;">Couldn\'t load the app\'s libraries</h2>' +
            '<p>These load from the internet the first time you open the app. This usually means a weak or interrupted connection.</p>' +
            '<p style="color:#8A8A8E;font-size:13px;">Didn\'t load: ' + missing.join(", ") + '</p>' +
            '<button onclick="location.reload()" style="background:#2F7DF6;color:#fff;border:none;padding:13px 22px;border-radius:10px;font-size:15px;font-weight:600;margin-top:8px;">Reload</button>' +
            '<p style="color:#8A8A8E;font-size:12px;margin-top:14px;">Make sure you have a stable signal, then tap Reload. Once loaded the first time, it works offline afterward.</p>' +
            '</div>';
        }
      }
    }, 4000);
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }
</script>
</body>
</html>
